<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYRE - Jigsaw</title>

  <style>
    :root {
      --bg: #f3efe4;
      --panel: #431708;
      --panel-border: #9a4f19;
      --ink: #2c241b;
      --muted: #c98b59;
      --accent: #b85b18;
      --accent-soft: #f2dfc6;
      --shadow: 0 24px 60px rgba(63, 42, 21, 0.14);
      --piece-overhang: 18px;
      --board-guide-image: url("board.png");
      --board-guide-overlay: linear-gradient(rgba(255, 248, 239, 0.12), rgba(255, 248, 239, 0.12));
      --board-guide-opacity: 1;
      --board-guide-inset: calc(var(--piece-overhang) * -1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: #f2e7d6;
      background:#3b1200;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }

    .status-card,
    .tray-wrap {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .status-card {
      position: sticky;
      top: 18px;
      padding: 20px;
      margin-bottom: 18px;
      z-index: 40;
      background:
        radial-gradient(circle at top left, rgba(184, 91, 24, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(184, 91, 24, 0.14), transparent 26%),
        linear-gradient(180deg, rgba(72, 29, 10, 0.98), rgba(49, 18, 7, 0.98));
      box-shadow:
        inset 0 0 0 1px rgba(230, 162, 102, 0.08),
        0 24px 60px rgba(17, 6, 2, 0.42);
    }

    .status-card.minimized .menu-body {
      display: none;
    }

    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -4px -4px 16px;
      padding: 4px;
      cursor: default;
    }

    .menu-title {
      margin: 0;
      font-family: "Baskerville Old Face", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f6e6cf;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.26);
    }

    .menu-toggle {
      width: auto;
      min-width: 88px;
      padding: 9px 12px;
    }

    .status-line + .status-line {
      margin-top: 14px;
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .menu-actions {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .menu-button {
      display: block;
      width: 100%;
      border: 1px solid rgba(255, 240, 220, 0.18);
      border-radius: 999px;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(118, 49, 12, 0.96), rgba(80, 31, 8, 0.96));
      color: #f6e6cf;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 0.9rem;
      box-shadow:
        inset 0 1px 0 rgba(255, 214, 178, 0.16),
        0 10px 24px rgba(18, 7, 3, 0.24);
    }

    .menu-button:hover {
      filter: brightness(1.08);
    }

    #shuffle-button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      background: linear-gradient(90deg, #c5661b, #8e3d0d);
      color: #fff5e7;
      cursor: pointer;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 0.9rem;
      box-shadow:
        inset 0 1px 0 rgba(255, 217, 184, 0.18),
        0 16px 30px rgba(96, 36, 9, 0.34);
    }

    #shuffle-button:hover {
      filter: brightness(1.04);
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(768px, 820px) minmax(320px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .board-wrap {
      position: sticky;
      top: 18px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

        .board {
      position: relative;
      width: 768px;
      height: 768px;
      overflow: visible;

      background: linear-gradient(rgba(255, 248, 239, 0.2), rgba(255, 248, 239, 0.2));
      box-shadow: 0 26px 70px rgba(48, 29, 16, 0.2);
    }

    .board::before {
      content: "";
      position: absolute;
      inset: var(--board-guide-inset);

      background: var(--board-guide-overlay), var(--board-guide-image);
      background-size: 100% 100%;
      background-position: center;
      opacity: var(--board-guide-opacity);
      pointer-events: none;
      z-index: 0;
      transition: opacity 260ms ease, filter 260ms ease, transform 260ms ease, background 260ms ease;
    }

    .board::after {
      content: "";
      position: absolute;
      inset: 0;

      pointer-events: none;
    }

    .board-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.28), transparent 42%),
        radial-gradient(circle at 50% 110%, rgba(255, 230, 190, 0.22), transparent 30%);
      z-index: 1;
    }

    .board-transition-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transform: scale(1.03);
      background-size: 100% 100%;
      background-position: center;
      z-index: 2;
    }

    .board-transition-overlay.active {
      animation: settle-board 520ms ease forwards;
    }

    @keyframes settle-board {
      0% {
        opacity: 0;
        transform: scale(1.04);
        filter: brightness(1.08);
      }

      55% {
        opacity: 0.92;
        transform: scale(1.012);
        filter: brightness(1.02);
      }

      100% {
        opacity: 1;
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .board-message {
      margin: 16px 8px 0;
      color: #e4cdb3;
      line-height: 1.5;
    }

    .board-controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 14px 8px 0;
      color: #e8d3ba;
    }

    .board-controls label {
      white-space: nowrap;
    }

    .guide-slider {
      flex: 1;
      accent-color: #d28455;
    }

    .guide-value {
      min-width: 52px;
      text-align: right;
      color: #f1dcc0;
    }

    .tray-wrap {
      min-height: 840px;
      padding: 20px;
    }

    .tray-header h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .tray-header p {
      margin: 8px 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .tray {
      position: relative;
      min-height: 710px;
      height: calc(100vh - 180px);
      overflow: auto;
      border-radius: 20px;
      background:
        linear-gradient(135deg,#2a0d00 ,#9b3f14),
        repeating-linear-gradient(
          45deg,
          rgba(255, 214, 170, 0.04) 0,
          rgba(255, 214, 170, 0.04) 16px,
          transparent 16px,
          transparent 32px
        );
      border: 2px inset rgb(49, 20, 0);
    }

    .piece {
      position: absolute;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: grab;
      touch-action: none;
      user-select: none;
      outline: none;
      transition: filter 160ms ease, transform 160ms ease;
      z-index: 2;
    }

    .piece canvas {
      display: block;
      filter: drop-shadow(0 12px 20px rgba(57, 40, 25, 0.18));
    }

    .piece:hover {
      transform: translateY(-2px);
    }

    .piece:focus-visible {
      filter: drop-shadow(0 0 0 4px rgba(182, 93, 47, 0.25));
    }

    .piece.dragging {
      position: fixed;
      cursor: grabbing;
      z-index: 9999;
      transition: none;
    }

    .piece.placed {
      cursor: default;
    }

    .piece.placed canvas {
      filter: drop-shadow(0 8px 12px rgba(57, 40, 25, 0.08));
    }

    .piece.level-two:not(.active) {
      display: none;
    }

    .tray-empty {
      display: grid;
      place-items: center;
      min-height: 100%;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .celebration {
      color: var(--accent);
      font-weight: 700;
    }

    .info-dialog {
      border: 1px solid rgba(255, 240, 220, 0.16);
      border-radius: 24px;
      padding: 0;
      width: min(560px, calc(100vw - 28px));
      background: #2a170f;
      color: #f2e7d6;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
    }

    .info-dialog::backdrop {
      background: rgba(14, 8, 5, 0.72);
    }

    .info-content {
      padding: 24px;
    }

    .info-content h2 {
      margin: 0 0 12px;
      font-size: 1.45rem;
    }

    .info-content p {
      margin: 0 0 14px;
      line-height: 1.6;
      color: #ebdcc6;
    }

    .info-content a {
      color: #ffd4a7;
    }

    .dialog-close {
      margin-top: 10px;
    }

    @media (max-width: 1280px) {
      .game-layout {
        grid-template-columns: 1fr;
      }

      .board-wrap {
        position: static;
      }

      .board {
        margin: 0 auto;
      }

      .tray {
        height: 780px;
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        width: min(100vw - 20px, 100%);
        padding-top: 18px;
      }

      .board {
        border-width: 7px;
        border-radius: 20px;
      }

      .tray-wrap,
      .status-card {
        border-radius: 18px;
      }
    }
  </style>
</head>
  <body>
  <main class="app-shell">
    <section class="game-layout">
      <div class="board-wrap">
        <div id="board" class="board">
          <div class="board-glow"></div>
        </div>
        <p id="board-message" class="board-message"></p>
        <div class="board-controls">
          <label class="status-label" for="guide-visibility">Visibilidade da guia</label>
          <input id="guide-visibility" class="guide-slider" type="range" min="0" max="100" value="100">
          <span id="guide-value" class="guide-value">100%</span>
        </div>
      </div>

      <aside class="tray-wrap">
        <div id="status-card" class="status-card">
          <div class="menu-header">
            <h2 class="menu-title">Tyra Kleen, Untitled.</h2>
            <button id="menu-toggle-button" class="menu-button menu-toggle" type="button">Minimizar</button>
          </div>
          <div id="menu-body" class="menu-body">
            <div class="status-line">
              <span class="status-label">Peças colocadas</span>
              <strong id="placed-label">0 / 100</strong>
            </div>
            <div class="menu-actions">
              <button id="reset-button" class="menu-button" type="button">Reset</button>
              <button id="shuffle-button" type="button">Embaralhar Peças Soltas</button>
              <button id="volume-button" class="menu-button" type="button">Som: Ligado</button>
              <button id="info-button" class="menu-button" type="button">Sobre Esta Imagem</button>
            </div>
          </div>
        </div>
        <div class="tray-header">
          <h2>Bandeja de Peças</h2>
          <br></br>
        </div>
        <div id="tray" class="tray"></div>
      </aside>
    </section>
  </main>

  <template id="piece-template">
    <button class="piece" type="button" aria-label="Puzzle piece"></button>
  </template>

  <dialog id="info-dialog" class="info-dialog">
    <div class="info-content">
      <h2>Sobre Esta Imagem</h2>
      <p><a href="https://www.tumblr.com/readingc33/798194245567692800/filetyra-kleen-untitled-sdjpg-wikimedia?source=share">Ilustração</a> inspirada em <a href="https://commons.wikimedia.org/wiki/File:Tyra_Kleen_Untitled_s.d.jpg">arte sem nome de Tyre Kleen</a></p>
      <button id="close-info-button" class="menu-button dialog-close" type="button">Fechar</button>
    </div>
  </dialog>

  <dialog id="end-dialog" class="info-dialog">
    <div class="info-content">
      <h2>Fim🎉 🎉</h2>
      <p>Parabéns! Você completou todas as peças do quebra-cabeça.</p>
      <button id="close-end-button" class="menu-button dialog-close" type="button">Fechar</button>
    </div>
  </dialog>

  <script src="assets.js"></script>
  <script>
    const BOARD_SIZE = 768;
    const SNAP_DISTANCE = 110;
    const SNAP_AXIS_TOLERANCE = 72;
    const SAVE_KEY = "tyreJigsawProgress";
    const LEGACY_SAVE_KEYS = ["TYREPuzzle"];
    const PIECE_PLACE_SOUND_SRC = "/fundodomar/766640__stavsounds__keyboard_tactile_9.ogg";

    const LEVELS = [
      {
        id: "levelOne",
        label: "Nivel Um",
        image:"tyre_level_one.png",
        rows: 0,
        cols: 0,
        occupancySource: "frame.png",
        occupancyMode: "background-diff",
        maskSource: "frame.png",
        maskMode: "region-fill",
        pieceMode: "frame-regions",
        unlockText: ""
      },
      {
        id: "levelTwo",
        label: "Nivel Dois",
        image:"tyr_level_two.png",
        rows: 6,
        cols: 6,
        occupancySource: "tyr_level_two.png",
        occupancyMode: "alpha",
        unlockText: ""
      }
    ];

    const board = document.getElementById("board");
    const tray = document.getElementById("tray");
    const placedLabel = document.getElementById("placed-label");
    const boardMessage = document.getElementById("board-message");
    const guideVisibilitySlider = document.getElementById("guide-visibility");
    const guideValue = document.getElementById("guide-value");
    const shuffleButton = document.getElementById("shuffle-button");
    const resetButton = document.getElementById("reset-button");
    const volumeButton = document.getElementById("volume-button");
    const infoButton = document.getElementById("info-button");
    const infoDialog = document.getElementById("info-dialog");
    const closeInfoButton = document.getElementById("close-info-button");
    const endDialog = document.getElementById("end-dialog");
    const closeEndButton = document.getElementById("close-end-button");
    const statusCard = document.getElementById("status-card");
    const menuToggleButton = document.getElementById("menu-toggle-button");
    const pieceTemplate = document.getElementById("piece-template");
    const placementSound = new Audio(PIECE_PLACE_SOUND_SRC);
    placementSound.preload = "auto";

    const EASY_BOARD_GUIDE = {
      image: "board.png",
      overlay: "linear-gradient(rgba(255, 248, 239, 0.48), rgba(255, 248, 239, 0.48))",
      opacity: "0.72",
      inset: "0px"
    };

    const LEVEL_TWO_BOARD_GUIDE = {
      image: "tyre_level_one.png",
      overlay: "linear-gradient(rgba(255, 248, 239, 0), rgba(255, 248, 239, 0))",
      opacity: "1",
      inset: "0px"
    };

    const state = {
      boardRect: null,
      trayRect: null,
      pieces: [],
      levels: [],
      currentLevelIndex: 0,
      drag: null,
      zCounter: 1,
      guideVisibility: 1,
      boardGuideBaseOpacity: 1,
      menuMinimized: false
    };
    let isSoundEnabled = true;

    initialize().catch((error) => {
      console.error(error);
      const detail = error && error.message ? ` ${error.message}` : "";
      boardMessage.textContent = `The puzzle could not be initialized.${detail}`;
    });

    async function initialize() {
      const savedProgress = loadProgress();
      applyBoardGuide();
      applyGuideVisibility(savedProgress?.guideVisibility ?? state.guideVisibility);
      const levels = await Promise.all(LEVELS.map(loadLevel));
      state.levels = levels;

      for (const [index, level] of levels.entries()) {
        createPieces(level, index === 0);
      }

      updateRects();
      restoreProgress(savedProgress);
      if (!savedProgress) {
        shuffleUnplacedPieces();
      }
      updateStatus();
      window.addEventListener("resize", handleResize);
      shuffleButton.addEventListener("click", shuffleUnplacedPieces);
      resetButton.addEventListener("click", resetPuzzle);
      volumeButton.addEventListener("click", toggleSound);
      guideVisibilitySlider.addEventListener("input", handleGuideVisibilityChange);
      infoButton.addEventListener("click", openInfoDialog);
      closeInfoButton.addEventListener("click", closeInfoDialog);
      closeEndButton.addEventListener("click", closeEndDialog);
      infoDialog.addEventListener("click", handleDialogBackdropClick);
      endDialog.addEventListener("click", handleDialogBackdropClick);
      menuToggleButton.addEventListener("click", toggleMenuMinimized);
      setMenuMinimized(Boolean(savedProgress?.menuMinimized));
    }

    function applyBoardGuide(guide = EASY_BOARD_GUIDE) {
      state.boardGuideBaseOpacity = Number.parseFloat(guide.opacity) || 1;
      board.style.setProperty("--board-guide-image", `url("${guide.image}")`);
      board.style.setProperty("--board-guide-overlay", guide.overlay);
      board.style.setProperty("--board-guide-inset", guide.inset);
      syncGuideOpacity();
    }

    function runBoardSettleEffect(imageSrc) {
      return new Promise((resolve) => {
        const overlay = document.createElement("div");
        overlay.className = "board-transition-overlay";
        overlay.style.backgroundImage = `url("${imageSrc}")`;
        board.appendChild(overlay);

        requestAnimationFrame(() => {
          overlay.classList.add("active");
        });

        window.setTimeout(() => {
          overlay.remove();
          resolve();
        }, 560);
      });
    }

    function handleGuideVisibilityChange(event) {
      applyGuideVisibility(Number(event.target.value) / 100);
      saveProgress();
    }

    function applyGuideVisibility(value) {
      const clamped = Math.max(0, Math.min(1, Number(value)));
      state.guideVisibility = clamped;
      guideVisibilitySlider.value = String(Math.round(clamped * 100));
      guideValue.textContent = `${Math.round(clamped * 100)}%`;
      syncGuideOpacity();
    }

    function syncGuideOpacity() {
      const opacity = Math.max(0, Math.min(1, state.boardGuideBaseOpacity * state.guideVisibility));
      board.style.setProperty("--board-guide-opacity", opacity.toFixed(2));
    }

    function toggleMenuMinimized() {
      setMenuMinimized(!state.menuMinimized);
      saveProgress();
    }

    function setMenuMinimized(minimized) {
      state.menuMinimized = minimized;
      statusCard.classList.toggle("minimized", minimized);
      menuToggleButton.textContent = minimized ? "Expandir" : "Minimizar";
    }

    function openInfoDialog() {
      infoDialog.showModal();
    }

    function closeInfoDialog() {
      infoDialog.close();
    }

    function closeEndDialog() {
      endDialog.close();
    }

    function handleDialogBackdropClick(event) {
      const dialog = event.currentTarget;
      const bounds = dialog.getBoundingClientRect();
      const clickedInside = (
        event.clientX >= bounds.left &&
        event.clientX <= bounds.right &&
        event.clientY >= bounds.top &&
        event.clientY <= bounds.bottom
      );

      if (!clickedInside) {
        dialog.close();
      }
    }

    function toggleSound() {
      isSoundEnabled = !isSoundEnabled;
      volumeButton.textContent = isSoundEnabled ? "Som: Ligado" : "Som: Desligado";
    }

    function resetPuzzle() {
      try {
        localStorage.removeItem(SAVE_KEY);
        for (const key of LEGACY_SAVE_KEYS) {
          localStorage.removeItem(key);
        }
      } catch (error) {
        console.warn("Unable to clear saved progress.", error);
      }
      window.location.reload();
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(SAVE_KEY) || LEGACY_SAVE_KEYS.map((key) => localStorage.getItem(key)).find(Boolean);
        if (!raw) {
          return null;
        }

        const saved = JSON.parse(raw);
        if (!saved || !Array.isArray(saved.placedPieceIds)) {
          return null;
        }

        return saved;
      } catch (error) {
        console.warn("Unable to load saved progress.", error);
        return null;
      }
    }

    function saveProgress() {
      try {
        const placedPieceIds = state.pieces.filter((piece) => piece.placed).map((piece) => piece.id);
        const payload = {
          guideVisibility: state.guideVisibility,
          menuMinimized: state.menuMinimized,
          placedPieceIds
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn("Unable to save progress.", error);
      }
    }

    function restoreProgress(savedProgress) {
      if (!savedProgress) {
        return;
      }

      applyBoardGuide();
      applyGuideVisibility(savedProgress.guideVisibility ?? 1);

      const placedIds = new Set(savedProgress.placedPieceIds);
      const hasPlacedLevelTwoPiece = state.pieces.some((piece) => piece.levelId === "levelTwo" && placedIds.has(piece.id));

      if (hasPlacedLevelTwoPiece || state.levels[0].totalPieces === [...placedIds].filter((id) => id.startsWith("levelOne-")).length) {
        activateLevelTwoPieces();
        applyBoardGuide(LEVEL_TWO_BOARD_GUIDE);
      }

      for (const piece of state.pieces) {
        if (placedIds.has(piece.id)) {
          restorePlacedPiece(piece);
        }
      }

      if (state.currentLevelIndex === 0 && state.levels[0].placedPieces === state.levels[0].totalPieces) {
        activateLevelTwoPieces();
      }

      state.currentLevelIndex = state.levels[1].placedPieces > 0 || state.levels[0].placedPieces === state.levels[0].totalPieces ? 1 : 0;
      shuffleUnplacedPieces();
      syncRestoredProgressState();
    }

    function restorePlacedPiece(piece) {
      board.appendChild(piece.element);
      piece.element.style.position = "absolute";
      piece.element.classList.add("placed");
      piece.placed = true;
      piece.active = true;
      piece.element.classList.add("active");
      piece.element.style.left = `${piece.targetX}px`;
      piece.element.style.top = `${piece.targetY}px`;
      piece.currentX = state.boardRect.left + piece.targetX;
      piece.currentY = state.boardRect.top + piece.targetY;

      const level = state.levels.find((entry) => entry.id === piece.levelId);
      level.placedPieces += 1;
    }

    function activateLevelTwoPieces() {
      const levelTwoPieces = state.pieces.filter((piece) => piece.levelId === "levelTwo");
      for (const piece of levelTwoPieces) {
        piece.active = true;
        piece.element.classList.add("active");
      }
    }

    function syncRestoredProgressState() {
      const levelOne = state.levels[0];
      const levelTwo = state.levels[1];

      if (levelTwo.placedPieces === levelTwo.totalPieces && levelTwo.totalPieces > 0) {
        placedLabel.textContent = `${levelTwo.totalPieces} / ${levelTwo.totalPieces}`;
        boardMessage.innerHTML = '<span class="celebration">As duas camadas estao completas.</span> A mandala foi montada por inteiro.';
        renderTrayEmptyState();
        endDialog.showModal();
        return;
      }

      if (levelOne.placedPieces === levelOne.totalPieces) {
        boardMessage.innerHTML = '<span class="celebration">Nivel um completo.</span>';
      }
    }

    async function loadLevel(config) {
      const [image, occupancyImage, maskImage] = await Promise.all([
        loadImage(config.image),
        config.occupancySource ? loadImage(config.occupancySource) : Promise.resolve(null),
        config.maskSource ? loadImage(config.maskSource) : Promise.resolve(null)
      ]);
      if (config.pieceMode === "frame-regions") {
        const regions = detectFrameRegions(maskImage || occupancyImage || image);
        return {
          ...config,
          image,
          occupancy: [],
          edges: [],
          totalPieces: regions.length,
          placedPieces: 0,
          maskImage,
          regions
        };
      }
      const occupancy = resolveOccupiedCells(config, occupancyImage || image);
      const edges = generateEdgeMap(config.rows, config.cols, occupancy);
      const totalPieces = occupancy.flat().filter(Boolean).length;
      return { ...config, image, occupancy, edges, totalPieces, placedPieces: 0, maskImage };
    }

    async function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => {
          reject(new Error(`Embedded image load failed for ${src}.`));
        };
        image.src = (typeof EMBEDDED_ASSETS !== "undefined" && EMBEDDED_ASSETS[src]) ? EMBEDDED_ASSETS[src] : src;
      });
    }

    function resolveOccupiedCells(config, image) {
      try {
        return detectOccupiedCells(image, config.rows, config.cols, config.occupancyMode);
      } catch (error) {
        if (Array.isArray(config.occupancyMask)) {
          console.warn(`Falling back to occupancy mask for ${config.id}.`, error);
          return config.occupancyMask.map((row) => row.map(Boolean));
        }

        console.warn(`Falling back to full occupancy for ${config.id}.`, error);
        return Array.from({ length: config.rows }, () => Array.from({ length: config.cols }, () => true));
      }
    }

    function detectOccupiedCells(image, rows, cols, mode = "alpha") {
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(image, 0, 0);

      const cellWidth = image.width / cols;
      const cellHeight = image.height / rows;
      const occupancy = Array.from({ length: rows }, () => Array.from({ length: cols }, () => false));
      const background = mode === "background-diff" ? sampleBackgroundColor(ctx, image.width, image.height) : null;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const startX = Math.max(0, Math.floor(col * cellWidth));
          const startY = Math.max(0, Math.floor(row * cellHeight));
          const endX = Math.min(image.width, Math.ceil((col + 1) * cellWidth));
          const endY = Math.min(image.height, Math.ceil((row + 1) * cellHeight));
          const width = Math.max(1, endX - startX);
          const height = Math.max(1, endY - startY);
          const { data } = ctx.getImageData(startX, startY, width, height);
          let solidPixels = 0;

          for (let index = 0; index < data.length; index += 4) {
            const alpha = data[index + 3];
            if (alpha <= 8) {
              continue;
            }

            if (mode === "background-diff") {
              const distance = colorDistance(
                data[index],
                data[index + 1],
                data[index + 2],
                background.r,
                background.g,
                background.b
              );
              if (distance > 16) {
                solidPixels += 1;
              }
            } else if (alpha > 8) {
              solidPixels += 1;
            }
          }

          const coverage = solidPixels / (width * height);
          occupancy[row][col] = coverage >= (mode === "background-diff" ? 0.004 : 0.05);
        }
      }

      return occupancy;
    }

    function sampleBackgroundColor(ctx, width, height) {
      const samplePoints = [
        [8, 8],
        [width - 8, 8],
        [8, height - 8],
        [width - 8, height - 8],
        [Math.floor(width / 2), 8],
        [8, Math.floor(height / 2)]
      ];

      const total = samplePoints.reduce((sum, [x, y]) => {
        const pixel = ctx.getImageData(Math.max(0, x), Math.max(0, y), 1, 1).data;
        return {
          r: sum.r + pixel[0],
          g: sum.g + pixel[1],
          b: sum.b + pixel[2]
        };
      }, { r: 0, g: 0, b: 0 });

      return {
        r: total.r / samplePoints.length,
        g: total.g / samplePoints.length,
        b: total.b / samplePoints.length
      };
    }

    function colorDistance(r1, g1, b1, r2, g2, b2) {
      return Math.hypot(r1 - r2, g1 - g2, b1 - b2);
    }

    function detectFrameRegions(image) {
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(image, 0, 0);

      const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const background = sampleBackgroundColor(ctx, canvas.width, canvas.height);
      const width = canvas.width;
      const height = canvas.height;
      const lineMask = new Uint8Array(width * height);

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const offset = (y * width + x) * 4;
          const alpha = data[offset + 3];
          if (alpha <= 8) {
            continue;
          }

          const distance = colorDistance(
            data[offset],
            data[offset + 1],
            data[offset + 2],
            background.r,
            background.g,
            background.b
          );

          if (distance > 10) {
            lineMask[y * width + x] = 1;
          }
        }
      }

      sealBorderOpenings(lineMask, width, height, 16);
      const expanded = dilateMask(lineMask, width, height, 1);
      const outsideMask = detectOutsideArea(expanded, width, height);
      const visited = new Uint8Array(width * height);
      const regions = [];
      const queueX = new Int32Array(width * height);
      const queueY = new Int32Array(width * height);

      for (let startY = 0; startY < height; startY += 1) {
        for (let startX = 0; startX < width; startX += 1) {
          const startIndex = startY * width + startX;
          if (visited[startIndex] || expanded[startIndex] || outsideMask[startIndex]) {
            continue;
          }

          let head = 0;
          let tail = 0;
          let area = 0;
          let minX = startX;
          let maxX = startX;
          let minY = startY;
          let maxY = startY;
          const pixels = [];

          visited[startIndex] = 1;
          queueX[tail] = startX;
          queueY[tail] = startY;
          tail += 1;

          while (head < tail) {
            const x = queueX[head];
            const y = queueY[head];
            head += 1;
            const index = y * width + x;

            area += 1;
            pixels.push(index);
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;

            enqueueIfOpen(x + 1, y);
            enqueueIfOpen(x - 1, y);
            enqueueIfOpen(x, y + 1);
            enqueueIfOpen(x, y - 1);

            function enqueueIfOpen(nx, ny) {
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) {
                return;
              }
              const neighborIndex = ny * width + nx;
              if (visited[neighborIndex] || expanded[neighborIndex] || outsideMask[neighborIndex]) {
                return;
              }
              visited[neighborIndex] = 1;
              queueX[tail] = nx;
              queueY[tail] = ny;
              tail += 1;
            }
          }

          if (area < 60) {
            continue;
          }

          const regionWidth = maxX - minX + 1;
          const regionHeight = maxY - minY + 1;
          const mask = new Uint8ClampedArray(regionWidth * regionHeight * 4);

          for (const index of pixels) {
            const x = index % width;
            const y = (index - x) / width;
            const local = ((y - minY) * regionWidth + (x - minX)) * 4;
            mask[local] = 255;
            mask[local + 1] = 255;
            mask[local + 2] = 255;
            mask[local + 3] = 255;
          }

          regions.push({
            id: `region-${regions.length}`,
            x: minX,
            y: minY,
            width: regionWidth,
            height: regionHeight,
            area,
            mask
          });
        }
      }

      regions.sort((a, b) => b.area - a.area);
      return mergeSmallRegions(regions, 520, 28);
    }

    function mergeSmallRegions(regions, minArea, maxGap) {
      const largeRegions = [];
      const smallRegions = [];

      for (const region of regions) {
        if (region.area >= minArea) {
          largeRegions.push(region);
        } else {
          smallRegions.push(region);
        }
      }

      for (const region of smallRegions) {
        let bestIndex = -1;
        let bestDistance = Number.POSITIVE_INFINITY;

        for (let index = 0; index < largeRegions.length; index += 1) {
          const candidate = largeRegions[index];
          const distance = boundingBoxGap(region, candidate);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        }

        if (bestIndex !== -1 && bestDistance <= maxGap) {
          largeRegions[bestIndex] = combineRegions(largeRegions[bestIndex], region);
        } else {
          largeRegions.push(region);
        }
      }

      return largeRegions
        .sort((a, b) => b.area - a.area)
        .map((region, index) => ({ ...region, id: `region-${index}` }));
    }

    function sealBorderOpenings(lineMask, width, height, depth) {
      for (let x = 0; x < width; x += 1) {
        for (let y = 0; y < Math.min(depth, height); y += 1) {
          if (lineMask[y * width + x]) {
            for (let fill = 0; fill <= y; fill += 1) {
              lineMask[fill * width + x] = 1;
            }
            break;
          }
        }

        for (let y = height - 1; y >= Math.max(0, height - depth); y -= 1) {
          if (lineMask[y * width + x]) {
            for (let fill = height - 1; fill >= y; fill -= 1) {
              lineMask[fill * width + x] = 1;
            }
            break;
          }
        }
      }

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < Math.min(depth, width); x += 1) {
          if (lineMask[y * width + x]) {
            for (let fill = 0; fill <= x; fill += 1) {
              lineMask[y * width + fill] = 1;
            }
            break;
          }
        }

        for (let x = width - 1; x >= Math.max(0, width - depth); x -= 1) {
          if (lineMask[y * width + x]) {
            for (let fill = width - 1; fill >= x; fill -= 1) {
              lineMask[y * width + fill] = 1;
            }
            break;
          }
        }
      }
    }

    function detectOutsideArea(lineMask, width, height) {
      const paddedWidth = width + 2;
      const paddedHeight = height + 2;
      const visited = new Uint8Array(paddedWidth * paddedHeight);
      const queueX = new Int32Array(paddedWidth * paddedHeight);
      const queueY = new Int32Array(paddedWidth * paddedHeight);
      let head = 0;
      let tail = 0;

      visited[0] = 1;
      queueX[tail] = 0;
      queueY[tail] = 0;
      tail += 1;

      while (head < tail) {
        const x = queueX[head];
        const y = queueY[head];
        head += 1;

        enqueue(x + 1, y);
        enqueue(x - 1, y);
        enqueue(x, y + 1);
        enqueue(x, y - 1);
      }

      const outside = new Uint8Array(width * height);
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (visited[(y + 1) * paddedWidth + (x + 1)]) {
            outside[y * width + x] = 1;
          }
        }
      }
      return outside;

      function enqueue(nx, ny) {
        if (nx < 0 || ny < 0 || nx >= paddedWidth || ny >= paddedHeight) {
          return;
        }
        const paddedIndex = ny * paddedWidth + nx;
        if (visited[paddedIndex]) {
          return;
        }

        if (nx > 0 && ny > 0 && nx < paddedWidth - 1 && ny < paddedHeight - 1) {
          const sourceIndex = (ny - 1) * width + (nx - 1);
          if (lineMask[sourceIndex]) {
            return;
          }
        }

        visited[paddedIndex] = 1;
        queueX[tail] = nx;
        queueY[tail] = ny;
        tail += 1;
      }
    }

    function boundingBoxGap(a, b) {
      const gapX = Math.max(0, Math.max(a.x - (b.x + b.width), b.x - (a.x + a.width)));
      const gapY = Math.max(0, Math.max(a.y - (b.y + b.height), b.y - (a.y + a.height)));
      return Math.hypot(gapX, gapY);
    }

    function combineRegions(a, b) {
      const minX = Math.min(a.x, b.x);
      const minY = Math.min(a.y, b.y);
      const maxX = Math.max(a.x + a.width, b.x + b.width);
      const maxY = Math.max(a.y + a.height, b.y + b.height);
      const width = maxX - minX;
      const height = maxY - minY;
      const mask = new Uint8ClampedArray(width * height * 4);

      drawRegionMaskInto(mask, width, height, a, minX, minY);
      drawRegionMaskInto(mask, width, height, b, minX, minY);

      return {
        id: a.id,
        x: minX,
        y: minY,
        width,
        height,
        area: a.area + b.area,
        mask
      };
    }

    function drawRegionMaskInto(targetMask, targetWidth, targetHeight, region, offsetX, offsetY) {
      for (let y = 0; y < region.height; y += 1) {
        for (let x = 0; x < region.width; x += 1) {
          const sourceIndex = (y * region.width + x) * 4;
          if (region.mask[sourceIndex + 3] === 0) {
            continue;
          }

          const tx = region.x - offsetX + x;
          const ty = region.y - offsetY + y;
          if (tx < 0 || ty < 0 || tx >= targetWidth || ty >= targetHeight) {
            continue;
          }

          const targetIndex = (ty * targetWidth + tx) * 4;
          targetMask[targetIndex] = 255;
          targetMask[targetIndex + 1] = 255;
          targetMask[targetIndex + 2] = 255;
          targetMask[targetIndex + 3] = 255;
        }
      }
    }

    function dilateMask(source, width, height, radius) {
      const output = new Uint8Array(source.length);
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          let filled = 0;
          for (let dy = -radius; dy <= radius && !filled; dy += 1) {
            for (let dx = -radius; dx <= radius; dx += 1) {
              const nx = x + dx;
              const ny = y + dy;
              if (nx < 0 || ny < 0 || nx >= width || ny >= height) {
                continue;
              }
              if (source[ny * width + nx]) {
                filled = 1;
                break;
              }
            }
          }
          output[y * width + x] = filled;
        }
      }
      return output;
    }

    function generateEdgeMap(rows, cols, occupancy = null) {
      const map = Array.from({ length: rows }, () => Array.from({ length: cols }, () => null));
      const isOccupied = (row, col) => occupancy ? Boolean(occupancy[row]?.[col]) : true;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          if (!isOccupied(row, col)) {
            map[row][col] = { top: 0, right: 0, bottom: 0, left: 0 };
            continue;
          }

          const top = row === 0 || !isOccupied(row - 1, col) ? 0 : -map[row - 1][col].bottom;
          const left = col === 0 || !isOccupied(row, col - 1) ? 0 : -map[row][col - 1].right;
          const bottom = row === rows - 1 || !isOccupied(row + 1, col) ? 0 : (Math.random() > 0.5 ? 1 : -1);
          const right = col === cols - 1 || !isOccupied(row, col + 1) ? 0 : (Math.random() > 0.5 ? 1 : -1);
          map[row][col] = { top, right, bottom, left };
        }
      }

      return map;
    }

    function createPieces(level, active) {
      if (level.pieceMode === "frame-regions") {
        createRegionPieces(level, active);
        return;
      }

      const pieceWidth = BOARD_SIZE / level.cols;
      const pieceHeight = BOARD_SIZE / level.rows;
      const tabSize = Math.round(Math.min(pieceWidth, pieceHeight) * 0.24);

      for (let row = 0; row < level.rows; row += 1) {
        for (let col = 0; col < level.cols; col += 1) {
          if (!level.occupancy[row][col]) {
            continue;
          }

          const element = pieceTemplate.content.firstElementChild.cloneNode(true);
          const edges = level.edges[row][col];
          const piece = buildPiece(level, row, col, pieceWidth, pieceHeight, tabSize, edges, element, active);
          state.pieces.push(piece);
        }
      }
    }

    function createRegionPieces(level, active) {
      for (const region of level.regions) {
        const element = pieceTemplate.content.firstElementChild.cloneNode(true);
        const canvas = document.createElement("canvas");
        canvas.width = region.width;
        canvas.height = region.height;
        canvas.style.width = `${region.width}px`;
        canvas.style.height = `${region.height}px`;

        drawRegionPiece(canvas, level.image, region);

        element.appendChild(canvas);
        element.dataset.level = level.id;
        element.classList.toggle("level-two", level.id === "levelTwo");
        element.classList.toggle("active", active);
        element.style.position = "absolute";
        element.style.width = `${region.width}px`;
        element.style.height = `${region.height}px`;

        const piece = {
          id: `${level.id}-${region.id}`,
          levelId: level.id,
          row: 0,
          col: 0,
          element,
          canvas,
          width: region.width,
          height: region.height,
          tabSize: 0,
          pieceWidth: region.width,
          pieceHeight: region.height,
          targetX: region.x,
          targetY: region.y,
          currentX: 0,
          currentY: 0,
          placed: false,
          active
        };

        element.addEventListener("pointerdown", (event) => startDrag(event, piece));
        tray.appendChild(element);
        state.pieces.push(piece);
      }
    }

    function buildPiece(level, row, col, pieceWidth, pieceHeight, tabSize, edges, element, active) {
      const canvas = document.createElement("canvas");
      const width = Math.round(pieceWidth + tabSize * 2);
      const height = Math.round(pieceHeight + tabSize * 2);

      canvas.width = width;
      canvas.height = height;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;

      drawPiece(canvas, level, row, col, pieceWidth, pieceHeight, tabSize, edges);

      element.appendChild(canvas);
      element.dataset.level = level.id;
      element.classList.toggle("level-two", level.id === "levelTwo");
      element.classList.toggle("active", active);
      element.style.position = "absolute";
      element.style.width = `${width}px`;
      element.style.height = `${height}px`;
      element.addEventListener("pointerdown", (event) => startDrag(event, piece));

      const targetX = Math.round(col * pieceWidth - tabSize);
      const targetY = Math.round(row * pieceHeight - tabSize);

      const piece = {
        id: `${level.id}-${row}-${col}`,
        levelId: level.id,
        row,
        col,
        element,
        canvas,
        width,
        height,
        tabSize,
        pieceWidth,
        pieceHeight,
        targetX,
        targetY,
        currentX: 0,
        currentY: 0,
        placed: false,
        active
      };

      tray.appendChild(element);
      return piece;
    }

    function drawRegionPiece(canvas, image, region) {
      const ctx = canvas.getContext("2d");
      ctx.drawImage(
        image,
        region.x,
        region.y,
        region.width,
        region.height,
        0,
        0,
        region.width,
        region.height
      );

      const maskCanvas = document.createElement("canvas");
      maskCanvas.width = region.width;
      maskCanvas.height = region.height;
      const maskCtx = maskCanvas.getContext("2d");
      maskCtx.putImageData(new ImageData(region.mask, region.width, region.height), 0, 0);

      ctx.save();
      ctx.globalCompositeOperation = "destination-in";
      ctx.drawImage(maskCanvas, 0, 0);
      ctx.restore();
    }

    function drawPiece(canvas, level, row, col, pieceWidth, pieceHeight, tabSize, edges) {
      const ctx = canvas.getContext("2d");
      const x = tabSize;
      const y = tabSize;

      ctx.save();
      ctx.beginPath();
      tracePiecePath(ctx, x, y, pieceWidth, pieceHeight, tabSize, edges);
      ctx.closePath();
      ctx.clip();

      ctx.drawImage(
        level.image,
        col * pieceWidth - tabSize,
        row * pieceHeight - tabSize,
        pieceWidth + tabSize * 2,
        pieceHeight + tabSize * 2,
        0,
        0,
        canvas.width,
        canvas.height
      );
      ctx.restore();

      if (level.maskImage) {
        applyPieceMask(ctx, level.maskImage, row, col, pieceWidth, pieceHeight, tabSize, level.maskMode);
      }

      ctx.beginPath();
      tracePiecePath(ctx, x, y, pieceWidth, pieceHeight, tabSize, edges);
      ctx.closePath();
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = "rgba(82, 53, 30, 0.48)";
      ctx.stroke();
    }

    function applyPieceMask(ctx, maskImage, row, col, pieceWidth, pieceHeight, tabSize, mode = "alpha") {
      const maskCanvas = document.createElement("canvas");
      maskCanvas.width = ctx.canvas.width;
      maskCanvas.height = ctx.canvas.height;
      const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });

      maskCtx.drawImage(
        maskImage,
        col * pieceWidth - tabSize,
        row * pieceHeight - tabSize,
        pieceWidth + tabSize * 2,
        pieceHeight + tabSize * 2,
        0,
        0,
        maskCanvas.width,
        maskCanvas.height
      );

      const imageData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
      const data = imageData.data;
      const background = mode === "background-diff"
        ? sampleBackgroundColor(maskCtx, maskCanvas.width, maskCanvas.height)
        : null;

      for (let index = 0; index < data.length; index += 4) {
        const alpha = data[index + 3];
        let keepPixel = alpha > 8;

        if (keepPixel && mode === "background-diff") {
          const distance = colorDistance(
            data[index],
            data[index + 1],
            data[index + 2],
            background.r,
            background.g,
            background.b
          );
          keepPixel = distance > 16;
        }

        data[index] = 255;
        data[index + 1] = 255;
        data[index + 2] = 255;
        data[index + 3] = keepPixel ? 255 : 0;
      }

      maskCtx.putImageData(imageData, 0, 0);

      ctx.save();
      ctx.globalCompositeOperation = "destination-in";
      ctx.drawImage(maskCanvas, 0, 0);
      ctx.restore();
    }

    function tracePiecePath(ctx, x, y, width, height, tabSize, edges) {
      ctx.moveTo(x, y);

      drawHorizontalEdge(ctx, x, y, width, tabSize, edges.top, 1);
      drawVerticalEdge(ctx, x + width, y, height, tabSize, edges.right, 1);
      drawHorizontalEdge(ctx, x + width, y + height, width, tabSize, edges.bottom, -1);
      drawVerticalEdge(ctx, x, y + height, height, tabSize, edges.left, -1);

      function drawHorizontalEdge(path, startX, startY, span, tab, direction, sign) {
        const segment = span / 3;

        if (sign === 1) {
          path.lineTo(startX + segment, startY);
          if (direction !== 0) {
            path.bezierCurveTo(
              startX + segment + tab * 0.15,
              startY,
              startX + segment + tab * 0.25,
              startY - tab * direction,
              startX + span / 2,
              startY - tab * direction
            );
            path.bezierCurveTo(
              startX + segment * 2 - tab * 0.25,
              startY - tab * direction,
              startX + segment * 2 - tab * 0.15,
              startY,
              startX + segment * 2,
              startY
            );
          } else {
            path.lineTo(startX + segment * 2, startY);
          }
          path.lineTo(startX + span, startY);
          return;
        }

        path.lineTo(startX - segment, startY);
        if (direction !== 0) {
          path.bezierCurveTo(
            startX - segment - tab * 0.15,
            startY,
            startX - segment - tab * 0.25,
            startY + tab * direction,
            startX - span / 2,
            startY + tab * direction
          );
          path.bezierCurveTo(
            startX - segment * 2 + tab * 0.25,
            startY + tab * direction,
            startX - segment * 2 + tab * 0.15,
            startY,
            startX - segment * 2,
            startY
          );
        } else {
          path.lineTo(startX - segment * 2, startY);
        }
        path.lineTo(startX - span, startY);
      }

      function drawVerticalEdge(path, startX, startY, span, tab, direction, sign) {
        const segment = span / 3;

        if (sign === 1) {
          path.lineTo(startX, startY + segment);
          if (direction !== 0) {
            path.bezierCurveTo(
              startX,
              startY + segment + tab * 0.15,
              startX + tab * direction,
              startY + segment + tab * 0.25,
              startX + tab * direction,
              startY + span / 2
            );
            path.bezierCurveTo(
              startX + tab * direction,
              startY + segment * 2 - tab * 0.25,
              startX,
              startY + segment * 2 - tab * 0.15,
              startX,
              startY + segment * 2
            );
          } else {
            path.lineTo(startX, startY + segment * 2);
          }
          path.lineTo(startX, startY + span);
          return;
        }

        path.lineTo(startX, startY - segment);
        if (direction !== 0) {
          path.bezierCurveTo(
            startX,
            startY - segment - tab * 0.15,
            startX - tab * direction,
            startY - segment - tab * 0.25,
            startX - tab * direction,
            startY - span / 2
          );
          path.bezierCurveTo(
            startX - tab * direction,
            startY - segment * 2 + tab * 0.25,
            startX,
            startY - segment * 2 + tab * 0.15,
            startX,
            startY - segment * 2
          );
        } else {
          path.lineTo(startX, startY - segment * 2);
        }
        path.lineTo(startX, startY - span);
      }
    }

    function startDrag(event, piece) {
      if (piece.placed || !piece.active) {
        return;
      }

      event.preventDefault();
      updateRects();

      const rect = piece.element.getBoundingClientRect();
      const pointerOffsetX = event.clientX - rect.left;
      const pointerOffsetY = event.clientY - rect.top;

      state.drag = { piece, pointerOffsetX, pointerOffsetY };
      piece.element.classList.add("dragging");
      piece.element.style.zIndex = String(++state.zCounter);

      const source = board.contains(piece.element) ? board : tray;
      if (source !== document.body) {
        const sourceRect = source.getBoundingClientRect();
        const localX = rect.left - sourceRect.left + source.scrollLeft;
        const localY = rect.top - sourceRect.top + source.scrollTop;
        document.body.appendChild(piece.element);
        piece.element.style.position = "fixed";
        setPiecePosition(piece, rect.left, rect.top);
        piece.sourceX = localX;
        piece.sourceY = localY;
      }

      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp, { once: true });
    }

    function onPointerMove(event) {
      if (!state.drag) {
        return;
      }

      const { piece, pointerOffsetX, pointerOffsetY } = state.drag;
      setPiecePosition(piece, event.clientX - pointerOffsetX, event.clientY - pointerOffsetY);
    }

    function onPointerUp() {
      if (!state.drag) {
        return;
      }

      const { piece } = state.drag;
      piece.element.classList.remove("dragging");

      const pieceCenterX = piece.currentX + piece.width / 2;
      const pieceCenterY = piece.currentY + piece.height / 2;
      const targetCenterX = state.boardRect.left + piece.targetX + piece.width / 2;
      const targetCenterY = state.boardRect.top + piece.targetY + piece.height / 2;
      const distance = Math.hypot(pieceCenterX - targetCenterX, pieceCenterY - targetCenterY);
      const axisAligned =
        Math.abs(piece.currentX - (state.boardRect.left + piece.targetX)) <= SNAP_AXIS_TOLERANCE &&
        Math.abs(piece.currentY - (state.boardRect.top + piece.targetY)) <= SNAP_AXIS_TOLERANCE;

      if (distance <= SNAP_DISTANCE || axisAligned) {
        placePiece(piece);
      } else {
        returnPieceToTray(piece);
      }

      state.drag = null;
      window.removeEventListener("pointermove", onPointerMove);
    }

    function setPiecePosition(piece, left, top) {
      piece.currentX = left;
      piece.currentY = top;
      piece.element.style.left = `${left}px`;
      piece.element.style.top = `${top}px`;
    }

    function placePiece(piece) {
      board.appendChild(piece.element);
      piece.element.style.position = "absolute";
      piece.element.classList.add("placed");
      piece.placed = true;
      playPlacementSound();
      piece.element.style.left = `${piece.targetX}px`;
      piece.element.style.top = `${piece.targetY}px`;
      piece.currentX = state.boardRect.left + piece.targetX;
      piece.currentY = state.boardRect.top + piece.targetY;

      const level = state.levels.find((entry) => entry.id === piece.levelId);
      level.placedPieces += 1;
      compactTrayPieces();
      saveProgress();
      updateStatus();
      checkLevelCompletion(level);
    }

    function playPlacementSound() {
      if (!isSoundEnabled) {
        return;
      }
      const soundInstance = placementSound.cloneNode();
      soundInstance.volume = 0.42;
      soundInstance.play().catch(() => {});
    }

    function returnPieceToTray(piece) {
      if (!tray.contains(piece.element)) {
        tray.appendChild(piece.element);
      }

      const localLeft = piece.currentX - (state.trayRect?.left ?? 0) + tray.scrollLeft;
      const localTop = piece.currentY - (state.trayRect?.top ?? 0) + tray.scrollTop;
      const maxLeft = Math.max(0, tray.scrollWidth - piece.width);
      const maxTop = Math.max(0, tray.scrollHeight - piece.height);
      const droppedInsideTray =
        piece.currentX + piece.width * 0.5 >= (state.trayRect?.left ?? 0) &&
        piece.currentX + piece.width * 0.5 <= (state.trayRect?.right ?? 0) &&
        piece.currentY + piece.height * 0.5 >= (state.trayRect?.top ?? 0) &&
        piece.currentY + piece.height * 0.5 <= (state.trayRect?.bottom ?? 0);

      if (droppedInsideTray) {
        piece.sourceX = Math.max(0, Math.min(maxLeft, localLeft));
        piece.sourceY = Math.max(0, Math.min(maxTop, localTop));
      }

      piece.element.style.position = "absolute";
      piece.element.style.left = `${piece.sourceX ?? 0}px`;
      piece.element.style.top = `${piece.sourceY ?? 0}px`;
      piece.currentX = (state.trayRect?.left ?? 0) + (piece.sourceX ?? 0);
      piece.currentY = (state.trayRect?.top ?? 0) + (piece.sourceY ?? 0);
      saveProgress();
    }

    function shuffleUnplacedPieces() {
      updateRects();

      const activePieces = state.pieces.filter((piece) => piece.active && !piece.placed);
      if (!activePieces.length) {
        renderTrayEmptyState();
        return;
      }

      clearTrayMessage();

      const padding = 12;
      let cursorX = padding;
      let cursorY = padding;
      let rowHeight = 0;
      const maxWidth = Math.max(tray.clientWidth - padding, 180);

      for (const piece of shuffle(activePieces)) {
        if (!tray.contains(piece.element)) {
          tray.appendChild(piece.element);
        }

        piece.element.style.position = "absolute";

        if (cursorX + piece.width > maxWidth) {
          cursorX = padding;
          cursorY += rowHeight + padding;
          rowHeight = 0;
        }

        piece.element.style.left = `${cursorX}px`;
        piece.element.style.top = `${cursorY}px`;
        piece.sourceX = cursorX;
        piece.sourceY = cursorY;
        piece.currentX = (state.trayRect?.left ?? 0) + cursorX;
        piece.currentY = (state.trayRect?.top ?? 0) + cursorY;

        cursorX += piece.width + padding;
        rowHeight = Math.max(rowHeight, piece.height);
      }

      tray.style.minHeight = `${Math.max(cursorY + rowHeight + padding, 710)}px`;
      saveProgress();
    }

    function compactTrayPieces() {
      updateRects();

      const activePieces = state.pieces.filter((piece) => piece.active && !piece.placed);
      if (!activePieces.length) {
        renderTrayEmptyState();
        return;
      }

      clearTrayMessage();

      const orderedPieces = [...activePieces].sort((a, b) => {
        const ay = a.sourceY ?? Number.MAX_SAFE_INTEGER;
        const by = b.sourceY ?? Number.MAX_SAFE_INTEGER;
        if (ay !== by) {
          return ay - by;
        }

        const ax = a.sourceX ?? Number.MAX_SAFE_INTEGER;
        const bx = b.sourceX ?? Number.MAX_SAFE_INTEGER;
        return ax - bx;
      });

      const padding = 12;
      let cursorX = padding;
      let cursorY = padding;
      let rowHeight = 0;
      const maxWidth = Math.max(tray.clientWidth - padding, 180);

      for (const piece of orderedPieces) {
        if (!tray.contains(piece.element)) {
          tray.appendChild(piece.element);
        }

        piece.element.style.position = "absolute";

        if (cursorX + piece.width > maxWidth) {
          cursorX = padding;
          cursorY += rowHeight + padding;
          rowHeight = 0;
        }

        piece.element.style.left = `${cursorX}px`;
        piece.element.style.top = `${cursorY}px`;
        piece.sourceX = cursorX;
        piece.sourceY = cursorY;
        piece.currentX = (state.trayRect?.left ?? 0) + cursorX;
        piece.currentY = (state.trayRect?.top ?? 0) + cursorY;

        cursorX += piece.width + padding;
        rowHeight = Math.max(rowHeight, piece.height);
      }

      tray.style.minHeight = `${Math.max(cursorY + rowHeight + padding, 710)}px`;
      saveProgress();
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateStatus() {
      const level = state.levels[state.currentLevelIndex];
      placedLabel.textContent = `${level.placedPieces} / ${level.totalPieces}`;
    }

    async function checkLevelCompletion(level) {
      if (level.placedPieces !== level.totalPieces) {
        return;
      }

      if (level.id === "levelOne") {
        await unlockLevelTwo();
        return;
      }

      placedLabel.textContent = `${level.totalPieces} / ${level.totalPieces}`;
      boardMessage.innerHTML = '<span class="celebration">As duas camadas estao completas.</span> A mandala foi montada por inteiro.';
      renderTrayEmptyState();
      endDialog.showModal();
    }

    async function unlockLevelTwo() {
      boardMessage.innerHTML = '<span class="celebration">Nivel um completo.</span> A imagem esta se assentando no tabuleiro.';
      await runBoardSettleEffect("tyre_level_one.png");
      state.currentLevelIndex = 1;
      activateLevelTwoPieces();
      applyBoardGuide(LEVEL_TWO_BOARD_GUIDE);

      boardMessage.innerHTML = '<span class="celebration">Nivel um completo.</span>';
      updateStatus();
      shuffleUnplacedPieces();
      saveProgress();
    }

    function renderTrayEmptyState() {
      clearTrayMessage();
      const unplacedActive = state.pieces.some((piece) => piece.active && !piece.placed);
      if (unplacedActive) {
        return;
      }

      const message = document.createElement("div");
      message.className = "tray-empty";
      message.id = "tray-empty";
      message.textContent = state.currentLevelIndex === 0
        ? "Todas as pecas ativas ja foram colocadas."
        : "A bandeja esta vazia porque todas as pecas ativas estao no tabuleiro.";
      tray.appendChild(message);
    }

    function clearTrayMessage() {
      const empty = document.getElementById("tray-empty");
      if (empty) {
        empty.remove();
      }
    }

    function handleResize() {
      updateRects();
      for (const piece of state.pieces) {
        if (piece.placed) {
          piece.element.style.left = `${piece.targetX}px`;
          piece.element.style.top = `${piece.targetY}px`;
        }
      }
    }

    function updateRects() {
      state.boardRect = board.getBoundingClientRect();
      state.trayRect = tray.getBoundingClientRect();
    }
  </script>
</body>
</html>
