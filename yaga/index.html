<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baba Witch Jigsaw</title>
  <style>
    @property --edge-fade-radius{
      syntax:"<percentage>";
      inherits:false;
      initial-value:150%;
    }
    :root{
      --bg-1:#130f18;
      --bg-2:#26354a;
      --panel:#2a2230;
      --panel-2:#182537;
      --line:#c1905d;
      --text:#fff3e6;
      --muted:#d8c7b2;
      --btn-1:rgba(132,76,50,.96);
      --btn-2:rgba(82,45,36,.96);
      --tray-grad-1:#161722;
      --tray-grad-2:#30445e;
      --tray-grad-3:#261824;
      --tray-glow:rgba(255,226,187,.08);
      --bg-glow:rgba(206,142,83,.25);
      --card-bg-1:rgba(255,255,255,.05);
      --card-bg-2:rgba(0,0,0,.08);
      --modal-backdrop:rgba(8,7,10,.72);
      --guide-opacity:.3;
      --board-size:min(92vw,768px);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Georgia,"Times New Roman",serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, var(--bg-glow), transparent 30%),
        linear-gradient(180deg,var(--bg-2),var(--bg-1) 72%);
      transition:background .65s ease,color .65s ease;
    }
    button,input{font:inherit}
    .app{
      width:min(1500px,calc(100vw - 24px));
      margin:0 auto;
      padding:18px 0 28px;
    }
    .layout{
      display:grid;
      grid-template-columns:minmax(0,860px) minmax(280px,1fr);
      gap:22px;
      align-items:start;
    }
    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 24px 60px rgba(0,0,0,.28);
    }
    .boardWrap{padding:18px; position:sticky; top:16px}
    .board{
      position:relative;
      width:var(--board-size);
      aspect-ratio:1;
      margin:0 auto;
      border-radius:18px;
      overflow:hidden;
      background:linear-gradient(rgba(255,247,235,.08),rgba(255,247,235,.08));
      box-shadow:inset 0 0 0 1px rgba(255,240,220,.12);
    }
    .board::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:var(--guide-image);
      background-size:100% 100%;
      opacity:var(--guide-opacity);
      pointer-events:none;
      z-index:0;
    }
    .boardGlow{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 16%,rgba(255,255,255,.14),transparent 34%),
        radial-gradient(circle at 50% 120%,rgba(255,195,122,.12),transparent 28%);
      pointer-events:none;
      z-index:1;
    }
    .board.finalStage::before,
    .board.finalStage .boardGlow{display:none}
    .board.finalStage{cursor:pointer}
    .finalBoardImage,
    .finalFullOverlay,
    .finalOverlayReveal,
    .finalOverlaySpot{
      position:absolute;
      inset:0;
    }
    .finalBoardImage{
      z-index:0;
      background:center / 100% 100% no-repeat;
    }
    .finalOverlayReveal{
      z-index:2;
      opacity:0;
      pointer-events:none;
      background:url("a_witch_overlay.png") center / 100% 100% no-repeat;
      transition:opacity .28s ease;
    }
    .finalOverlayReveal.show{opacity:1}
    .finalFullOverlay{
      z-index:2;
      opacity:0;
      pointer-events:none;
      background:center / 100% 100% no-repeat;
      filter:brightness(1) drop-shadow(0 0 0 rgba(248,230,198,0));
      transition:opacity 1.25s ease, filter 1.4s ease;
    }
    .finalFullOverlay.show{
      opacity:1;
      animation:overlayShine 1.9s ease-in-out infinite alternate;
    }
    .finalOverlayReveal.flash{
      opacity:1;
      filter:brightness(1.35) drop-shadow(0 0 18px rgba(248,230,198,.72));
    }
    .finalOverlaySpot{
      z-index:3;
      border:0;
      padding:0;
      background:transparent;
      cursor:pointer;
    }
    .finalOverlaySpot.found{pointer-events:none}
    .boardComplete{
      position:absolute;
      inset:auto 18px 18px 18px;
      z-index:5;
      text-align:center;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(24,20,28,.8);
      border:1px solid rgba(255,222,188,.22);
      opacity:0;
      transform:translateY(6px);
      transition:.35s ease;
      pointer-events:none;
    }
    .boardComplete.show{opacity:1;transform:translateY(0)}
    .controls{
      margin:14px 4px 0;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .controls.hidden{display:none}
    .label,.small{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.76rem;
    }
    .slider{flex:1; accent-color:#d08c53}
    .side{
      padding:18px;
      min-height:780px;
    }
    .card{
      padding:18px;
      margin-bottom:18px;
      border-radius:20px;
      background:linear-gradient(180deg,var(--card-bg-1),var(--card-bg-2));
      border:1px solid rgba(255,231,200,.12);
    }
    h1,h2,p{margin:0}
    .title{
      margin-bottom:12px;
      font-size:1.4rem;
      font-family:"Palatino Linotype",Georgia,serif;
    }
    .line + .line{margin-top:12px}
    .value{display:inline-block; margin-top:4px; color:#fff6ea}
    .actions{
      display:grid;
      gap:8px;
      margin-top:16px;
    }
    .btn{
      width:100%;
      border:1px solid rgba(255,234,210,.18);
      border-radius:999px;
      padding:10px 12px;
      background:linear-gradient(180deg,var(--btn-1),var(--btn-2));
      color:#fff4e8;
      cursor:pointer;
    }
    .btn:hover{filter:brightness(1.06)}
    .btn:disabled{opacity:.55; cursor:not-allowed}
    .trayTitle{margin:0 0 12px}
    .tray{
      position:relative;
      min-height:620px;
      height:calc(100vh - 210px);
      overflow:auto;
      border-radius:18px;
      background:
        radial-gradient(circle at top,var(--tray-glow),transparent 30%),
        linear-gradient(135deg,var(--tray-grad-1),var(--tray-grad-2) 56%,var(--tray-grad-3));
      border:1px solid rgba(255,220,186,.12);
    }
    .piece{
      position:absolute;
      border:0;
      padding:0;
      margin:0;
      background:transparent;
      cursor:grab;
      touch-action:none;
      user-select:none;
      transition:transform .14s ease, filter .14s ease;
      z-index:2;
    }
    .piece:hover{transform:translateY(-2px)}
    .piece.drag{
      position:fixed;
      cursor:grabbing;
      z-index:9999;
      transition:none;
    }
    .piece.placed{cursor:default}
    .piece canvas{
      display:block;
      filter:drop-shadow(0 14px 24px rgba(0,0,0,.28));
    }
    .piece.placed canvas{
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.1));
    }
    .empty{
      display:grid;
      place-items:center;
      min-height:100%;
      text-align:center;
      padding:24px;
      color:var(--muted);
    }
    .aboutModal{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:20px;
      background:var(--modal-backdrop);
      z-index:10000;
    }
    .aboutModal.show{display:grid}
    .aboutCard{
      width:min(420px,calc(100vw - 40px));
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      box-shadow:0 24px 70px rgba(0,0,0,.42);
      text-align:center;
    }
    .aboutCard h2{
      margin:0 0 14px;
      font-size:1.25rem;
      font-family:"Palatino Linotype",Georgia,serif;
    }
    .aboutContent a{
      display:inline-block;
      color:var(--text);
    }
    .aboutContent img{
      display:block;
      max-width:100%;
      height:auto;
      margin:0 auto;
      border-radius:10px;
      border:1px solid rgba(255,231,200,.22);
      box-shadow:0 12px 34px rgba(0,0,0,.28);
    }
    .aboutClose{margin-top:14px}
    .nextLevelOverlay{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:24px;
      background:#000;
      --edge-fade-radius:150%;
      -webkit-mask-image:radial-gradient(circle at center, transparent 0%, transparent var(--edge-fade-radius), #000 calc(var(--edge-fade-radius) + 24%));
      mask-image:radial-gradient(circle at center, transparent 0%, transparent var(--edge-fade-radius), #000 calc(var(--edge-fade-radius) + 24%));
      z-index:9998;
      pointer-events:none;
    }
    .nextLevelOverlay.show{
      display:block;
      animation:edgeDarken 3.8s cubic-bezier(.5,0,.16,1) forwards;
    }
    .nextLevelOverlay.reveal{
      display:block;
      animation:centerReveal 3.4s cubic-bezier(.5,0,.16,1) forwards;
    }
    .nextLevelOverlay.blackout{
      display:block;
      background:#000;
      -webkit-mask-image:none;
      mask-image:none;
      animation:none;
    }
    @keyframes overlayShine{
      from{filter:brightness(1) drop-shadow(0 0 0 rgba(248,230,198,0))}
      to{filter:brightness(1.28) drop-shadow(0 0 24px rgba(248,230,198,.62))}
    }
    @keyframes edgeDarken{
      0%{--edge-fade-radius:150%}
      35%{--edge-fade-radius:95%}
      72%{--edge-fade-radius:28%}
      100%{--edge-fade-radius:-28%}
    }
    @keyframes centerReveal{
      0%{--edge-fade-radius:-28%}
      28%{--edge-fade-radius:28%}
      66%{--edge-fade-radius:95%}
      100%{--edge-fade-radius:150%}
    }
    @media (max-width:1200px){
      .layout{grid-template-columns:1fr}
      .boardWrap{position:static}
      .tray{height:700px}
    }
    @media (max-width:760px){
      .app{width:min(100vw - 14px,100%)}
      .panel{border-radius:18px}
      .controls{flex-wrap:wrap}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="layout">
      <div class="panel boardWrap">
        <div id="board" class="board">
          <div class="boardGlow"></div>
          <div id="complete" class="boardComplete">Puzzle complete.</div>
        </div>
        <div class="controls">
          <label class="label" for="guide">Board Visibility</label>
          <input id="guide" class="slider" type="range" min="0" max="100" value="100">
          <span id="guideVal">100%</span>
        </div>
      </div>
      <aside class="panel side">
        <div class="card">
          <h1 id="puzzleTitle" class="title">Baba Witch Jigsaw</h1>
          <div class="line">
            <span class="small">Progress</span><br>
            <strong id="placed" class="value">0 / ?</strong>
          </div>
          <div class="line">
            <span class="small">Level</span><br>
            <strong id="levelLabel" class="value">1 / 2</strong>
          </div>
          <div class="actions">
            <button id="shuffle" class="btn" type="button">Shuffle Loose Pieces</button>
            <button id="testSolve" class="btn" type="button">Test Auto Place</button>
            <button id="reset" class="btn" type="button">Reset Puzzle</button>
            <button id="about" class="btn" type="button">Sobre esta imagem</button>
          </div>
        </div>
        <h2 class="trayTitle">Piece Tray</h2>
        <div id="tray" class="tray"></div>
      </aside>
    </section>
  </main>
  <div id="aboutModal" class="aboutModal" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
    <div class="aboutCard">
      <h2 id="aboutTitle">Sobre esta imagem</h2>
      <div id="aboutContent" class="aboutContent"></div>
      <button id="aboutClose" class="btn aboutClose" type="button">Fechar</button>
    </div>
  </div>
  <div id="nextLevelOverlay" class="nextLevelOverlay"></div>
  <script>
    const STORAGE_KEY = "baba_witch_jigsaw_levels";
    const PASSWORD_KEY = "baba_witch_jigsaw_unlocked";
    const MAGIC_PASSWORD = "baba yaga";
    const IMAGE_SIZE = 768;
    const SNAP = 34;
    const LEVELS = [
      {name:"Baba Witch", image:"baba_witch.png", guideMaxOpacity:0.3, cols:11, rows:6},
      {name:"A Witch", image:"a_witch.png", guideMaxOpacity:0.3, cols:11, rows:6}
    ];
    const LEVEL_OVERLAYS = ["baba_witch_overlay.png", "a_witch_overlay.png"];
    const THEMES = [
      {
        bg1:"#17100c", bg2:"#4a2e19", panel:"#3a281b", panel2:"#1f150e", line:"#d09043", text:"#fff1df", muted:"#dfc1a0",
        btn1:"rgba(151,88,43,.96)", btn2:"rgba(91,53,30,.96)", tray1:"#21140e", tray2:"#5b351e", tray3:"#2d1b10",
        trayGlow:"rgba(255,212,151,.12)", bgGlow:"rgba(222,151,71,.3)", card1:"rgba(255,231,198,.07)", card2:"rgba(38,19,8,.28)",
        modalBackdrop:"rgba(16,10,7,.76)"
      },
      {
        bg1:"#100907", bg2:"#4a1c0d", panel:"#2f170f", panel2:"#170b07", line:"#b8874b", text:"#f8e6c6", muted:"#c9aa78",
        btn1:"rgba(136,50,20,.96)", btn2:"rgba(82,36,15,.96)", tray1:"#130906", tray2:"#623601", tray3:"#2a1209",
        trayGlow:"rgba(227,200,151,.13)", bgGlow:"rgba(136,50,20,.32)", card1:"rgba(227,200,151,.08)", card2:"rgba(14,6,4,.3)",
        modalBackdrop:"rgba(14,6,4,.78)"
      }
    ];
    const ABOUT_IMAGES = [
      `<a title="Ivan Bilibin, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Bilibin._Baba_Yaga.jpg" target="_blank" rel="noopener"><img width="250" alt="Bilibin. Baba Yaga" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Bilibin._Baba_Yaga.jpg/250px-Bilibin._Baba_Yaga.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail"></a>`,
      `<a title="Edgar Bundy, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:A_Witch_Edgar_Bundy).jpg" target="_blank" rel="noopener"><img width="250" alt="A Witch Edgar Bundy)" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/A_Witch_Edgar_Bundy%29.jpg/250px-A_Witch_Edgar_Bundy%29.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail"></a>`
    ];
    const FINAL_TARGETS = [
      {id:"1", x:9, y:12, radius:43},
      {id:"2", x:18, y:754, radius:35},
      {id:"3", x:749, y:750, radius:32},
      {id:"4", x:747, y:20, radius:30},
      {id:"5", x:245, y:50, radius:14},
      {id:"6", x:743, y:313, radius:14},
      {id:"7", x:384, y:743, radius:17},
      {id:"8", x:28, y:455, radius:16},
      {id:"9", x:383, y:23, radius:16},
      {id:"10", x:522, y:719, radius:15}
    ];
    const MEMORY_END_ROUND = 13;

    const el = {
      board: document.getElementById("board"),
      tray: document.getElementById("tray"),
      controls: document.querySelector(".controls"),
      guide: document.getElementById("guide"),
      guideVal: document.getElementById("guideVal"),
      placed: document.getElementById("placed"),
      puzzleTitle: document.getElementById("puzzleTitle"),
      levelLabel: document.getElementById("levelLabel"),
      shuffle: document.getElementById("shuffle"),
      testSolve: document.getElementById("testSolve"),
      reset: document.getElementById("reset"),
      about: document.getElementById("about"),
      aboutModal: document.getElementById("aboutModal"),
      aboutContent: document.getElementById("aboutContent"),
      aboutClose: document.getElementById("aboutClose"),
      nextLevelOverlay: document.getElementById("nextLevelOverlay"),
      complete: document.getElementById("complete")
    };

    const state = {
      pieces: [],
      drag: null,
      z: 2,
      boardRect: null,
      trayRect: null,
      scale: 1,
      images: [],
      image: null,
      edges: [],
      currentLevel: 0,
      progress: Array.from({length: LEVELS.length}, () => []),
      trayOrder: [],
      mode: "puzzle",
      finalFound: [],
      memorySequence: [],
      memoryRound: 1,
      memoryInputIndex: 0,
      memoryShowing: false,
      memoryComplete: false,
      memoryTimers: [],
      nextLevelTimer: null,
      transitioning: false,
      guide: 1
    };

    el.guide.addEventListener("input", () => {
      applyGuide(Number(el.guide.value) / 100);
      save();
    });
    el.shuffle.addEventListener("click", shuffleLoose);
    el.testSolve.addEventListener("click", solveAll);
    el.reset.addEventListener("click", resetPuzzle);
    el.about.addEventListener("click", showAboutImage);
    el.aboutClose.addEventListener("click", hideAboutImage);
    el.aboutModal.addEventListener("click", (event) => {
      if(event.target === el.aboutModal) hideAboutImage();
    });
    addEventListener("keydown", (event) => {
      if(event.key === "Escape") hideAboutImage();
    });
    addEventListener("resize", onResize);

    preloadImages().then(() => {
      const saved = load();
      if(saved){
        state.guide = saved.guide;
        state.currentLevel = Math.min(saved.currentLevel, LEVELS.length - 1);
        state.progress = saved.progress;
        state.mode = saved.mode;
        state.finalFound = saved.finalFound;
        state.memorySequence = saved.memorySequence;
        state.memoryRound = saved.memoryRound;
        state.memoryComplete = saved.memoryComplete;
      }
      if(!requirePassword()){
        showPasswordRequired();
        return;
      }
      if(state.mode === "final"){
        buildFinalStage();
        return;
      }
      buildLevel(state.currentLevel);
    });

    function preloadImages(){
      return Promise.all(LEVELS.map((level) => new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = level.image;
      }))).then((images) => {
        state.images = images;
      });
    }

    function requirePassword(){
      if(localStorage.getItem(PASSWORD_KEY) === "true") return true;

      while(true){
        const answer = prompt("Palavra Mágica:");
        if(answer === null) return false;

        if(answer.trim().toLowerCase() === MAGIC_PASSWORD){
          localStorage.setItem(PASSWORD_KEY, "true");
          return true;
        }

        alert("Palavra mágica incorreta.");
      }
    }

    function showPasswordRequired(){
      applyTheme(0);
      el.puzzleTitle.textContent = "Baba Witch Jigsaw";
      el.levelLabel.textContent = "Locked";
      el.placed.textContent = "0 / 66";
      el.complete.textContent = "Palavra Mágica required.";
      el.complete.classList.add("show");
      el.tray.innerHTML = '<div class="empty">Palavra Mágica required.</div>';
      el.shuffle.disabled = true;
      el.testSolve.disabled = true;
      el.about.disabled = true;
    }

    function getLevel(){
      return LEVELS[state.currentLevel];
    }

    function getLevelTotal(level = getLevel()){
      return level.rows * level.cols;
    }

    function applyGuide(value){
      state.guide = value;
      const level = getLevel();
      const opacity = value * level.guideMaxOpacity;
      document.documentElement.style.setProperty("--guide-image", `url("${level.image}")`);
      document.documentElement.style.setProperty("--guide-opacity", String(opacity));
      el.guide.value = String(Math.round(value * 100));
      el.guideVal.textContent = `${Math.round(value * 100)}%`;
    }

    function applyTheme(levelIndex){
      const theme = THEMES[levelIndex] || THEMES[0];
      const root = document.documentElement;
      root.style.setProperty("--bg-1", theme.bg1);
      root.style.setProperty("--bg-2", theme.bg2);
      root.style.setProperty("--panel", theme.panel);
      root.style.setProperty("--panel-2", theme.panel2);
      root.style.setProperty("--line", theme.line);
      root.style.setProperty("--text", theme.text);
      root.style.setProperty("--muted", theme.muted);
      root.style.setProperty("--btn-1", theme.btn1);
      root.style.setProperty("--btn-2", theme.btn2);
      root.style.setProperty("--tray-grad-1", theme.tray1);
      root.style.setProperty("--tray-grad-2", theme.tray2);
      root.style.setProperty("--tray-grad-3", theme.tray3);
      root.style.setProperty("--tray-glow", theme.trayGlow);
      root.style.setProperty("--bg-glow", theme.bgGlow);
      root.style.setProperty("--card-bg-1", theme.card1);
      root.style.setProperty("--card-bg-2", theme.card2);
      root.style.setProperty("--modal-backdrop", theme.modalBackdrop);
    }

    function showAboutImage(){
      el.aboutContent.innerHTML = ABOUT_IMAGES[state.currentLevel] || ABOUT_IMAGES[0];
      el.aboutModal.classList.add("show");
    }

    function hideAboutImage(){
      el.aboutModal.classList.remove("show");
    }

    function setLevelUi(){
      const levelNumber = state.currentLevel + 1;
      el.puzzleTitle.textContent = "Baba Witch Jigsaw";
      el.levelLabel.textContent = `${levelNumber} / ${LEVELS.length}`;
      document.title = "Baba Witch Jigsaw";
      el.complete.textContent = levelNumber < LEVELS.length
        ? `Level ${levelNumber} complete. Loading level ${levelNumber + 1}...`
        : "Puzzle complete.";
    }

    function updateProgressDisplay(){
      const placed = state.pieces.filter((piece) => piece.placed).length;
      el.placed.textContent = `${placed} / ${getLevelTotal()}`;
    }

    function getTab(level = getLevel()){
      return Math.round(Math.min(IMAGE_SIZE / level.cols, IMAGE_SIZE / level.rows) * 0.24);
    }

    function buildLevel(levelIndex, preserveTransition = false){
      clearMemoryTimers();
      if(!preserveTransition) clearNextLevelTimer();
      state.mode = "puzzle";
      el.shuffle.disabled = false;
      el.testSolve.disabled = false;
      el.about.disabled = false;
      state.currentLevel = levelIndex;
      applyTheme(levelIndex);
      state.image = state.images[levelIndex];
      state.edges = createEdges(LEVELS[levelIndex].rows, LEVELS[levelIndex].cols);
      state.transitioning = false;
      state.trayOrder = [];
      state.pieces.forEach((piece) => piece.node.remove());
      state.pieces = [];
      el.board.classList.remove("finalStage");
      el.controls.classList.remove("hidden");
      el.nextLevelOverlay.classList.remove("show", "reveal", "blackout");
      el.board.querySelectorAll(".finalBoardImage,.finalFullOverlay,.finalOverlayReveal,.finalOverlaySpot").forEach((node) => node.remove());
      el.tray.innerHTML = "";
      el.complete.classList.remove("show");
      setLevelUi();
      createPieces();
      rects();
      applyGuide(state.guide);
      restoreCurrentLevel();
      updatePlaced();
    }

    function createEdges(rows, cols){
      const map = Array.from({length: rows}, () => Array.from({length: cols}, () => null));
      for(let r = 0; r < rows; r++){
        for(let c = 0; c < cols; c++){
          const top = r === 0 ? 0 : -map[r - 1][c].bottom;
          const left = c === 0 ? 0 : -map[r][c - 1].right;
          const bottom = r === rows - 1 ? 0 : (Math.random() > 0.5 ? 1 : -1);
          const right = c === cols - 1 ? 0 : (Math.random() > 0.5 ? 1 : -1);
          map[r][c] = {top, right, bottom, left};
        }
      }
      return map;
    }

    function createPieces(){
      const level = getLevel();
      const pw = IMAGE_SIZE / level.cols;
      const ph = IMAGE_SIZE / level.rows;
      const tab = getTab(level);
      for(let row = 0; row < level.rows; row++){
        for(let col = 0; col < level.cols; col++){
          const piece = makePiece(row, col, pw, ph, tab, state.edges[row][col]);
          state.pieces.push(piece);
          el.tray.appendChild(piece.node);
        }
      }
    }

    function makePiece(row, col, pw, ph, tab, edge){
      const w = Math.round(pw + tab * 2);
      const h = Math.round(ph + tab * 2);
      const node = document.createElement("button");
      node.className = "piece";
      node.type = "button";
      node.setAttribute("aria-label", `Puzzle piece ${row * getLevel().cols + col + 1}`);
      node.style.width = `${w}px`;
      node.style.height = `${h}px`;

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      drawPiece(canvas, row, col, pw, ph, tab, edge);
      node.appendChild(canvas);

      const piece = {
        id: `L${state.currentLevel}-${row}-${col}`,
        row,
        col,
        w,
        h,
        node,
        canvas,
        edge,
        placed: false,
        sourceX: 0,
        sourceY: 0,
        currentX: 0,
        currentY: 0,
        targetX: col * pw - tab,
        targetY: row * ph - tab
      };

      node.addEventListener("pointerdown", (event) => startDrag(event, piece));
      return piece;
    }

    function drawPiece(canvas, row, col, pw, ph, tab, edge){
      const ctx = canvas.getContext("2d");
      const sx = tab;
      const sy = tab;
      const sourceScaleX = state.image.naturalWidth / IMAGE_SIZE;
      const sourceScaleY = state.image.naturalHeight / IMAGE_SIZE;
      ctx.save();
      ctx.beginPath();
      tracePiece(ctx, sx, sy, pw, ph, tab, edge);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(
        state.image,
        (col * pw - tab) * sourceScaleX,
        (row * ph - tab) * sourceScaleY,
        (pw + tab * 2) * sourceScaleX,
        (ph + tab * 2) * sourceScaleY,
        0,
        0,
        canvas.width,
        canvas.height
      );
      ctx.restore();
      ctx.beginPath();
      tracePiece(ctx, sx, sy, pw, ph, tab, edge);
      ctx.closePath();
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = "rgba(70,48,34,.62)";
      ctx.stroke();
    }

    function tracePiece(ctx, sx, sy, w, h, tab, edge){
      ctx.moveTo(sx, sy);
      traceH(ctx, sx, sy, w, tab, edge.top, 1);
      traceV(ctx, sx + w, sy, h, tab, edge.right, 1);
      traceH(ctx, sx + w, sy + h, w, tab, edge.bottom, -1);
      traceV(ctx, sx, sy + h, h, tab, edge.left, -1);
    }

    function traceH(ctx, sx, sy, span, tab, dir, sign){
      const segment = span / 3;
      if(sign === 1){
        ctx.lineTo(sx + segment, sy);
        if(dir !== 0){
          ctx.bezierCurveTo(sx + segment + tab * 0.15, sy, sx + segment + tab * 0.25, sy - tab * dir, sx + span / 2, sy - tab * dir);
          ctx.bezierCurveTo(sx + segment * 2 - tab * 0.25, sy - tab * dir, sx + segment * 2 - tab * 0.15, sy, sx + segment * 2, sy);
        }else{
          ctx.lineTo(sx + segment * 2, sy);
        }
        ctx.lineTo(sx + span, sy);
      }else{
        ctx.lineTo(sx - segment, sy);
        if(dir !== 0){
          ctx.bezierCurveTo(sx - segment - tab * 0.15, sy, sx - segment - tab * 0.25, sy + tab * dir, sx - span / 2, sy + tab * dir);
          ctx.bezierCurveTo(sx - segment * 2 + tab * 0.25, sy + tab * dir, sx - segment * 2 + tab * 0.15, sy, sx - segment * 2, sy);
        }else{
          ctx.lineTo(sx - segment * 2, sy);
        }
        ctx.lineTo(sx - span, sy);
      }
    }

    function traceV(ctx, sx, sy, span, tab, dir, sign){
      const segment = span / 3;
      if(sign === 1){
        ctx.lineTo(sx, sy + segment);
        if(dir !== 0){
          ctx.bezierCurveTo(sx, sy + segment + tab * 0.15, sx + tab * dir, sy + segment + tab * 0.25, sx + tab * dir, sy + span / 2);
          ctx.bezierCurveTo(sx + tab * dir, sy + segment * 2 - tab * 0.25, sx, sy + segment * 2 - tab * 0.15, sx, sy + segment * 2);
        }else{
          ctx.lineTo(sx, sy + segment * 2);
        }
        ctx.lineTo(sx, sy + span);
      }else{
        ctx.lineTo(sx, sy - segment);
        if(dir !== 0){
          ctx.bezierCurveTo(sx, sy - segment - tab * 0.15, sx - tab * dir, sy - segment - tab * 0.25, sx - tab * dir, sy - span / 2);
          ctx.bezierCurveTo(sx - tab * dir, sy - segment * 2 + tab * 0.25, sx, sy - segment * 2 + tab * 0.15, sx, sy - segment * 2);
        }else{
          ctx.lineTo(sx, sy - segment * 2);
        }
        ctx.lineTo(sx, sy - span);
      }
    }

    function startDrag(event, piece){
      if(piece.placed || state.transitioning) return;
      event.preventDefault();
      rects();
      const rect = piece.node.getBoundingClientRect();
      state.drag = {
        piece,
        ox: event.clientX - rect.left,
        oy: event.clientY - rect.top
      };
      piece.node.classList.add("drag");
      piece.node.style.zIndex = String(state.z++);
      const source = el.board.contains(piece.node) ? el.board : el.tray;
      if(source !== document.body){
        const sourceRect = source.getBoundingClientRect();
        piece.sourceX = rect.left - sourceRect.left + source.scrollLeft;
        piece.sourceY = rect.top - sourceRect.top + source.scrollTop;
        document.body.appendChild(piece.node);
        piece.node.style.position = "fixed";
        placeAt(piece, rect.left, rect.top);
      }
      addEventListener("pointermove", moveDrag);
      addEventListener("pointerup", endDrag, {once:true});
    }

    function moveDrag(event){
      if(!state.drag) return;
      const {piece, ox, oy} = state.drag;
      placeAt(piece, event.clientX - ox, event.clientY - oy);
    }

    function endDrag(){
      if(!state.drag) return;
      const piece = state.drag.piece;
      piece.node.classList.remove("drag");
      const targetLeft = state.boardRect.left + piece.targetX * state.scale;
      const targetTop = state.boardRect.top + piece.targetY * state.scale;
      const distance = Math.hypot(piece.currentX - targetLeft, piece.currentY - targetTop);
      if(distance <= SNAP){
        placeOnBoard(piece);
      }else{
        backToTray(piece);
      }
      state.drag = null;
      removeEventListener("pointermove", moveDrag);
      save();
    }

    function placeAt(piece, left, top){
      piece.currentX = left;
      piece.currentY = top;
      piece.node.style.left = `${left}px`;
      piece.node.style.top = `${top}px`;
    }

    function placeOnBoard(piece){
      if(!piece.placed){
        piece.placed = true;
        piece.node.classList.add("placed");
      }
      el.board.appendChild(piece.node);
      piece.node.style.position = "absolute";
      piece.node.style.left = `${piece.targetX * state.scale}px`;
      piece.node.style.top = `${piece.targetY * state.scale}px`;
      piece.currentX = state.boardRect.left + piece.targetX * state.scale;
      piece.currentY = state.boardRect.top + piece.targetY * state.scale;
      layoutLoosePieces();
      updatePlaced();
    }

    function backToTray(piece){
      if(!el.tray.contains(piece.node)){
        el.tray.appendChild(piece.node);
      }
      piece.placed = false;
      piece.node.classList.remove("placed");
      piece.node.style.position = "absolute";
      layoutLoosePieces();
      updatePlaced();
    }

    function shuffleLoose(){
      if(state.transitioning) return;
      rects();
      const loose = shuffle(state.pieces.filter((piece) => !piece.placed));
      if(!loose.length){
        showEmpty();
        return;
      }
      layoutLoosePieces(loose, true);
      save();
    }

    function layoutLoosePieces(loosePieces = state.pieces.filter((piece) => !piece.placed), randomizeOrder = false){
      clearEmpty();
      if(!loosePieces.length){
        state.trayOrder = [];
        showEmpty();
        return;
      }
      rects();
      const pad = 12;
      const trayWidth = Math.max(el.tray.clientWidth, 220);
      const cellWidth = Math.max(...loosePieces.map((piece) => piece.w)) + pad;
      const cellHeight = Math.max(...loosePieces.map((piece) => piece.h)) + pad;
      const columns = Math.max(1, Math.floor((trayWidth - pad) / cellWidth));
      const rows = Math.ceil(loosePieces.length / columns);
      const trayHeight = Math.max(620, rows * cellHeight + pad);
      el.tray.style.minHeight = `${trayHeight}px`;

      const orderedPieces = getTrayOrder(loosePieces, columns, randomizeOrder);
      state.trayOrder = orderedPieces.map((piece) => piece.id);
      orderedPieces.forEach((piece, index) => {
        el.tray.appendChild(piece.node);
        piece.node.style.position = "absolute";
        const col = index % columns;
        const row = Math.floor(index / columns);
        const left = pad + col * cellWidth + Math.max(0, (cellWidth - pad - piece.w) / 2);
        const top = pad + row * cellHeight + Math.max(0, (cellHeight - pad - piece.h) / 2);
        piece.node.style.left = `${left}px`;
        piece.node.style.top = `${top}px`;
        piece.sourceX = left;
        piece.sourceY = top;
        piece.currentX = state.trayRect.left + left;
        piece.currentY = state.trayRect.top + top;
        piece.node.style.zIndex = String(state.z++);
      });
    }

    function solveAll(){
      if(state.transitioning) return;
      rects();
      clearEmpty();
      const loose = state.pieces.filter((piece) => !piece.placed);
      if(loose.length <= 1){
        save();
        return;
      }
      const holdOut = loose[loose.length - 1];
      loose.forEach((piece) => {
        if(piece !== holdOut){
          placeOnBoard(piece);
        }
      });
      save();
    }

    function updatePlaced(){
      if(state.mode !== "puzzle") return;
      const placed = state.pieces.filter((piece) => piece.placed).length;
      const total = getLevelTotal();
      updateProgressDisplay();
      if(placed === total){
        el.complete.classList.add("show");
        clearEmpty();
        save();
        if(state.currentLevel < LEVELS.length - 1 && !state.transitioning){
          state.transitioning = true;
          setTimeout(() => {
            startLevelTransition(state.currentLevel, state.currentLevel + 1);
          }, 700);
        }else if(state.currentLevel === LEVELS.length - 1 && !state.transitioning){
          state.transitioning = true;
          setTimeout(() => {
            buildFinalStage();
          }, 700);
        }
      }else{
        el.complete.classList.remove("show");
      }
    }

    function startLevelTransition(fromLevelIndex, toLevelIndex){
      showCompletedLevelImage(fromLevelIndex);
      clearNextLevelTimer();
      state.nextLevelTimer = setTimeout(() => {
        el.nextLevelOverlay.classList.remove("reveal", "blackout");
        el.nextLevelOverlay.classList.add("show");
        state.nextLevelTimer = setTimeout(() => {
          el.nextLevelOverlay.classList.add("blackout");
          buildLevel(toLevelIndex, true);
          el.nextLevelOverlay.classList.remove("show", "blackout");
          el.nextLevelOverlay.classList.add("reveal");
          state.nextLevelTimer = setTimeout(() => {
            el.nextLevelOverlay.classList.remove("reveal", "blackout");
            state.nextLevelTimer = null;
          }, 3500);
        }, 3800);
      }, 1300);
    }

    function showCompletedLevelImage(levelIndex){
      const level = LEVELS[levelIndex];
      el.board.classList.add("finalStage");
      el.controls.classList.add("hidden");
      el.complete.classList.remove("show");
      el.board.querySelectorAll(".finalBoardImage,.finalFullOverlay,.finalOverlayReveal,.finalOverlaySpot").forEach((node) => node.remove());
      state.pieces.forEach((piece) => piece.node.remove());
      state.pieces = [];
      clearEmpty();
      el.tray.innerHTML = '<div class="empty">Loading next level.</div>';
      document.documentElement.style.setProperty("--guide-opacity", "0");

      const image = document.createElement("div");
      image.className = "finalBoardImage";
      image.style.backgroundImage = `url("${level.image}")`;
      el.board.prepend(image);

      const overlay = document.createElement("div");
      overlay.className = "finalFullOverlay";
      overlay.style.backgroundImage = `url("${LEVEL_OVERLAYS[levelIndex]}")`;
      el.board.appendChild(overlay);
      requestAnimationFrame(() => {
        overlay.classList.add("show");
      });
    }

    function buildFinalStage(){
      state.mode = "final";
      state.currentLevel = 1;
      state.transitioning = false;
      state.memoryInputIndex = 0;
      clearMemoryTimers();
      applyTheme(1);
      state.pieces.forEach((piece) => piece.node.remove());
      state.pieces = [];
      state.trayOrder = [];
      if(state.memorySequence.length !== MEMORY_END_ROUND){
        state.memorySequence = createMemorySequence();
        state.memoryRound = 1;
        state.memoryComplete = false;
      }
      el.board.classList.add("finalStage");
      el.controls.classList.add("hidden");
      el.board.querySelectorAll(".finalBoardImage,.finalFullOverlay,.finalOverlayReveal,.finalOverlaySpot").forEach((node) => node.remove());
      el.complete.classList.remove("show");
      el.shuffle.disabled = true;
      el.testSolve.disabled = true;
      el.about.disabled = false;
      el.puzzleTitle.textContent = "Baba Witch Jigsaw";
      el.levelLabel.textContent = "Final";
      updateMemoryStatus();
      document.documentElement.style.setProperty("--guide-opacity", "0");

      const image = document.createElement("div");
      image.className = "finalBoardImage";
      image.style.backgroundImage = `url("${LEVELS[1].image}")`;
      el.board.prepend(image);

      const fullOverlay = document.createElement("div");
      fullOverlay.className = "finalFullOverlay";
      fullOverlay.style.backgroundImage = `url("${LEVEL_OVERLAYS[1]}")`;
      el.board.appendChild(fullOverlay);

      FINAL_TARGETS.forEach((target) => {
        const reveal = document.createElement("div");
        reveal.className = "finalOverlayReveal";
        reveal.dataset.target = target.id;
        reveal.style.backgroundImage = `url("${LEVEL_OVERLAYS[1]}")`;
        reveal.style.clipPath = `circle(${toPct(target.radius)} at ${toPct(target.x)} ${toPct(target.y)})`;
        reveal.style.webkitClipPath = reveal.style.clipPath;

        const spot = document.createElement("button");
        spot.className = "finalOverlaySpot";
        spot.type = "button";
        spot.setAttribute("aria-label", `Memory area ${target.id}`);
        spot.dataset.target = target.id;
        spot.style.clipPath = `circle(${toPct(target.radius)} at ${toPct(target.x)} ${toPct(target.y)})`;
        spot.style.webkitClipPath = spot.style.clipPath;
        spot.addEventListener("click", () => handleMemoryClick(target.id));

        el.board.appendChild(reveal);
        el.board.appendChild(spot);
      });
      if(state.memoryComplete){
        showMemoryComplete();
      }else{
        playMemoryRound();
      }
      save();
    }

    function createMemorySequence(){
      const sequence = [];
      const counts = new Map();
      while(sequence.length < MEMORY_END_ROUND){
        const candidates = FINAL_TARGETS
          .map((target) => target.id)
          .filter((targetId) => (counts.get(targetId) || 0) < 3);
        const target = candidates[Math.floor(Math.random() * candidates.length)];
        const last = sequence[sequence.length - 1];
        const beforeLast = sequence[sequence.length - 2];
        const thirdLast = sequence[sequence.length - 3];
        if(target === last && target === beforeLast && target === thirdLast) continue;
        sequence.push(target);
        counts.set(target, (counts.get(target) || 0) + 1);
      }
      return sequence;
    }

    function playMemoryRound(){
      clearMemoryTimers();
      state.memoryShowing = true;
      state.memoryInputIndex = 0;
      updateMemoryStatus("Watch");
      const sequence = state.memorySequence.slice(0, state.memoryRound);
      sequence.forEach((targetId, index) => {
        state.memoryTimers.push(setTimeout(() => flashMemoryTarget(targetId, 520), index * 760));
      });
      state.memoryTimers.push(setTimeout(() => {
        state.memoryShowing = false;
        updateMemoryStatus("Repeat");
      }, sequence.length * 760 + 80));
    }

    function handleMemoryClick(targetId){
      if(state.memoryShowing || state.memoryComplete) return;
      flashMemoryTarget(targetId, 260);
      const expected = state.memorySequence[state.memoryInputIndex];
      if(targetId !== expected){
        state.memoryInputIndex = 0;
        state.memoryShowing = true;
        updateMemoryStatus("Try again");
        state.memoryTimers.push(setTimeout(playMemoryRound, 900));
        return;
      }

      state.memoryInputIndex += 1;
      if(state.memoryInputIndex < state.memoryRound){
        updateMemoryStatus("Repeat");
        return;
      }

      if(state.memoryRound >= MEMORY_END_ROUND){
        state.memoryComplete = true;
        showMemoryComplete();
      }else{
        state.memoryRound += 1;
        state.memoryInputIndex = 0;
        state.memoryShowing = true;
        updateMemoryStatus("Good");
        state.memoryTimers.push(setTimeout(playMemoryRound, 900));
      }
      save();
    }

    function flashMemoryTarget(targetId, duration){
      const reveal = el.board.querySelector(`.finalOverlayReveal[data-target="${targetId}"]`);
      if(!reveal) return;
      reveal.classList.add("flash");
      state.memoryTimers.push(setTimeout(() => {
        reveal.classList.remove("flash");
      }, duration));
    }

    function updateMemoryStatus(label = "Memory"){
      el.placed.textContent = `${state.memoryRound} / ${MEMORY_END_ROUND}`;
      el.tray.innerHTML = `<div class="empty">${label}: ${state.memoryInputIndex} / ${state.memoryRound}</div>`;
    }

    function showMemoryComplete(){
      clearMemoryTimers();
      state.memoryShowing = false;
      el.placed.textContent = `${MEMORY_END_ROUND} / ${MEMORY_END_ROUND}`;
      el.tray.innerHTML = '<div class="empty">Memory complete.</div>';
      FINAL_TARGETS.forEach((target) => {
        el.board.querySelector(`.finalOverlayReveal[data-target="${target.id}"]`)?.classList.add("show");
      });
      el.board.querySelector(".finalFullOverlay")?.classList.add("show");
      el.complete.textContent = "Memory complete.";
      el.complete.classList.add("show");
      startNextLevelTransition();
      save();
    }

    function clearMemoryTimers(){
      state.memoryTimers.forEach((timer) => clearTimeout(timer));
      state.memoryTimers = [];
    }

    function startNextLevelTransition(){
      clearNextLevelTimer();
      state.nextLevelTimer = setTimeout(() => {
        el.nextLevelOverlay.classList.add("show");
        state.nextLevelTimer = setTimeout(() => {
          el.nextLevelOverlay.classList.add("blackout");
          try{
            sessionStorage.setItem("baba_center_next_level", "true");
          }catch(_error){}
          state.nextLevelTimer = setTimeout(() => {
            location.href = "index_abruxa.html";
          }, 120);
        }, 3800);
      }, 1300);
    }

    function clearNextLevelTimer(){
      if(state.nextLevelTimer){
        clearTimeout(state.nextLevelTimer);
        state.nextLevelTimer = null;
      }
    }

    function toPct(value){
      return `${(value / IMAGE_SIZE) * 100}%`;
    }

    function showEmpty(){
      clearEmpty();
      if(state.pieces.some((piece) => !piece.placed)) return;
      const empty = document.createElement("div");
      empty.id = "empty";
      empty.className = "empty";
      empty.textContent = "All pieces are on the board.";
      el.tray.appendChild(empty);
    }

    function clearEmpty(){
      document.getElementById("empty")?.remove();
    }

    function rects(){
      state.boardRect = el.board.getBoundingClientRect();
      state.trayRect = el.tray.getBoundingClientRect();
      state.scale = state.boardRect.width / IMAGE_SIZE;
    }

    function onResize(){
      rects();
      state.pieces.forEach((piece) => {
        if(piece.placed){
          piece.node.style.left = `${piece.targetX * state.scale}px`;
          piece.node.style.top = `${piece.targetY * state.scale}px`;
          piece.currentX = state.boardRect.left + piece.targetX * state.scale;
          piece.currentY = state.boardRect.top + piece.targetY * state.scale;
        }else{
          piece.currentX = state.trayRect.left + piece.sourceX;
          piece.currentY = state.trayRect.top + piece.sourceY;
        }
      });
    }

    function save(){
      try{
        const progress = state.progress.map((ids) => [...ids]);
        if(state.mode === "puzzle"){
          progress[state.currentLevel] = state.pieces.filter((piece) => piece.placed).map((piece) => piece.id);
        }
        state.progress = progress;
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          guide: state.guide,
          currentLevel: state.currentLevel,
          progress,
          mode: state.mode,
          finalFound: state.finalFound,
          memorySequence: state.memorySequence,
          memoryRound: state.memoryRound,
          memoryComplete: state.memoryComplete
        }));
      }catch(_error){}
    }

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        const parsed = JSON.parse(raw);
        if(!Array.isArray(parsed.progress)) return null;
        return {
          guide: typeof parsed.guide === "number" ? parsed.guide : 1,
          currentLevel: typeof parsed.currentLevel === "number" ? parsed.currentLevel : 0,
          progress: Array.from({length: LEVELS.length}, (_item, index) => Array.isArray(parsed.progress[index]) ? parsed.progress[index] : []),
          mode: parsed.mode === "final" ? "final" : "puzzle",
          finalFound: Array.isArray(parsed.finalFound) ? parsed.finalFound : [],
          memorySequence: Array.isArray(parsed.memorySequence) ? parsed.memorySequence : [],
          memoryRound: typeof parsed.memoryRound === "number" ? Math.max(1, Math.min(MEMORY_END_ROUND, parsed.memoryRound)) : 1,
          memoryComplete: parsed.memoryComplete === true
        };
      }catch(_error){
        return null;
      }
    }

    function restoreCurrentLevel(){
      const ids = new Set(state.progress[state.currentLevel] || []);
      if(!ids.size){
        shuffleLoose();
        return;
      }
      state.pieces.forEach((piece) => {
        if(ids.has(piece.id)){
          placeOnBoard(piece);
        }
      });
      shuffleLoose();
      state.pieces.forEach((piece) => {
        if(piece.placed){
          placeOnBoard(piece);
        }
      });
      if(ids.size === getLevelTotal()){
        showEmpty();
      }
    }

    function resetPuzzle(){
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(PASSWORD_KEY);
      state.guide = 1;
      state.progress = Array.from({length: LEVELS.length}, () => []);
      state.mode = "puzzle";
      state.finalFound = [];
      state.memorySequence = [];
      state.memoryRound = 1;
      state.memoryInputIndex = 0;
      state.memoryShowing = false;
      state.memoryComplete = false;
      clearMemoryTimers();
      clearNextLevelTimer();
      el.nextLevelOverlay.classList.remove("show", "blackout");
      if(!requirePassword()){
        showPasswordRequired();
        return;
      }
      buildLevel(0);
    }

    function shuffle(list){
      const copy = [...list];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createTrayOrder(pieces, columns){
      if(pieces.length <= 2) return shuffle(pieces);

      let best = shuffle(pieces);
      let bestScore = scoreTrayOrder(best, columns);
      for(let attempt = 0; attempt < 700 && bestScore > 0; attempt++){
        const candidate = shuffle(pieces);
        const score = scoreTrayOrder(candidate, columns);
        if(score < bestScore){
          best = candidate;
          bestScore = score;
        }
      }
      return best;
    }

    function getTrayOrder(pieces, columns, randomizeOrder){
      if(randomizeOrder || !state.trayOrder.length){
        return createTrayOrder(pieces, columns);
      }

      const byId = new Map(pieces.map((piece) => [piece.id, piece]));
      const ordered = state.trayOrder
        .map((id) => byId.get(id))
        .filter(Boolean);
      const used = new Set(ordered.map((piece) => piece.id));
      const missing = pieces.filter((piece) => !used.has(piece.id));

      if(missing.length){
        ordered.push(...createTrayOrder(missing, columns));
      }
      return ordered;
    }

    function scoreTrayOrder(pieces, columns){
      let score = 0;
      for(let index = 0; index < pieces.length; index++){
        const piece = pieces[index];
        const right = index % columns < columns - 1 ? pieces[index + 1] : null;
        const down = pieces[index + columns];
        if(right) score += getNeighborPenalty(piece, right);
        if(down) score += getNeighborPenalty(piece, down);
      }
      return score;
    }

    function getNeighborPenalty(a, b){
      const samePuzzleRow = a.row === b.row;
      const samePuzzleCol = a.col === b.col;
      const horizontalNeighbors = samePuzzleRow && Math.abs(a.col - b.col) === 1;
      const verticalNeighbors = samePuzzleCol && Math.abs(a.row - b.row) === 1;
      if(horizontalNeighbors || verticalNeighbors) return 10;
      if(samePuzzleRow || samePuzzleCol) return 1;
      return 0;
    }
