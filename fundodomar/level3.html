<script>

const overlayStorageKey = "polvo_selectedOverlay";
const guessStorageKey = "polvo_wordGuesses";
const hintStorageKey = "polvo_wordHints";
const defaultOverlay = "polvo_gabarito1.webp";
const foundSound = new Audio("683102__florianreichelt__water-drop.mp3");
foundSound.preload = "auto";
foundSound.volume = 0.45;
const sourceMapSize = 1280;
const displayMapSize = 1280;
const regionDefinitions = [
{ id: 1, left: 0, top: 0, width: displayMapSize, height: displayMapSize / 3 },
{ id: 2, left: 0, top: displayMapSize / 3, width: displayMapSize, height: displayMapSize / 3 },
{ id: 3, left: 0, top: (displayMapSize / 3) * 2, width: displayMapSize, height: displayMapSize / 3 }
];

/* load */
window.addEventListener("load", function(){

/* ===== hidden words: show ???? ===== */
document.querySelectorAll(".hidden-word").forEach(li => {

let word = li.dataset.hidden;
li.textContent = "?".repeat(word.length);
li.spellcheck = false;

});

loadGuesses();
loadHints();
updateRevealAllButton();
updateCounter();

let helpTooltip = document.querySelector(".help-tooltip");
if(helpTooltip){
helpTooltip.textContent = "Como jogar: Encontre os animais escondidos. Para dicas, clique com o botão direito do mouse no nome do animal no menu. 1° Dica- Nome do Animal escondido; 2° Dica -  Região onde ele se encontra. Boa Sorte!"
;
}

/* restore overlay OR set default */
let savedOverlay = localStorage.getItem(overlayStorageKey);
let validOverlays = Array.from(overlaySelector.options).map(option => option.value);

if(savedOverlay && validOverlays.includes(savedOverlay)){
  currentOverlay = savedOverlay;
  overlaySelector.value = savedOverlay;
}else{
  // FIRST TIME → force option 1
  currentOverlay = defaultOverlay;
  overlaySelector.value = defaultOverlay;
}
  
/* apply overlay immediately */
overlaySelector.dispatchEvent(new Event("change"));

/* load answers AFTER overlay is ready */
loadProgress();
});


/* ===== toggle mode ===== */

let allowToggleOff=true;

toggleClickMode.onclick=function(){

allowToggleOff=!allowToggleOff;

this.textContent=allowToggleOff
? "Desmarcar: ON"
: "Desmarcar: OFF";
};

//* OVERLAY */

overlaySelector.onchange = function(){

currentOverlay = this.value;

Object.values(answerClips).forEach(clip=>{
clip.style.backgroundImage = "url('" + currentOverlay + "')";
});

localStorage.setItem("polvo_selectedOverlay", currentOverlay);
};

/* ===== menu items ===== */

const menuItems={};

document.querySelectorAll("#wordList li").forEach(li=>{
menuItems[li.id]=li;
});

/* ===== menu definitions ===== */

const tooltip = document.getElementById("wordTooltip");
const revealAllButton = document.getElementById("revealAllButton");
let revealAllMenuWords = false;

function getHiddenLength(text){
return Array.from(text || "").length;
}

function trimGuess(text, maxLength){
return Array.from((text || "").replace(/\r?\n/g, "")).slice(0, maxLength).join("");
}

function getMaskedWord(li){
return "?".repeat(getHiddenLength(li.dataset.hidden));
}

function renderMenuWord(li){

if(!li.classList.contains("hidden-word")) return;

let hintLevel = Number(li.dataset.hintLevel || 0);
li.classList.toggle("hint-revealed", hintLevel >= 1 && !li.classList.contains("found"));

if(revealAllMenuWords){
  li.textContent = li.dataset.hidden;
  return;
}

if(li.classList.contains("found")){
  li.textContent = li.dataset.hidden;
  return;
}

if(hintLevel >= 1){
  li.textContent = li.dataset.hidden;
  return;
}

let guess = li.dataset.guess || "";
li.textContent = guess || getMaskedWord(li);
}

function saveGuesses(){

let guesses = {};

document.querySelectorAll("#wordList li.hidden-word").forEach(li => {
if(li.dataset.guess){
  guesses[li.id] = li.dataset.guess;
}
});

localStorage.setItem(guessStorageKey, JSON.stringify(guesses));
}

function loadGuesses(){

let saved = localStorage.getItem(guessStorageKey);
if(!saved) return;

let guesses;

try{
  guesses = JSON.parse(saved);
}catch{
  return;
}

document.querySelectorAll("#wordList li.hidden-word").forEach(li => {

let savedGuess = guesses[li.id];
if(!savedGuess) return;

li.dataset.guess = trimGuess(savedGuess, getHiddenLength(li.dataset.hidden));
renderMenuWord(li);

});
}

function saveHints(){

let hints = {};

document.querySelectorAll("#wordList li.hidden-word").forEach(li => {
let hintLevel = Number(li.dataset.hintLevel || 0);
if(hintLevel > 0){
  hints[li.id] = hintLevel;
}
});

localStorage.setItem(hintStorageKey, JSON.stringify(hints));
}

function loadHints(){

let saved = localStorage.getItem(hintStorageKey);
if(!saved) return;

let hints;

try{
  hints = JSON.parse(saved);
}catch{
  return;
}

document.querySelectorAll("#wordList li.hidden-word").forEach(li => {

let savedHint = Number(hints[li.id] || 0);
if(savedHint <= 0) return;

li.dataset.hintLevel = String(Math.min(savedHint, 2));
renderMenuWord(li);

});
}

function updateRevealAllButton(){
revealAllButton.textContent = revealAllMenuWords ? "Ocultar Nome dos Elementos" : "Revelar Nome dos Elementos";
}

function toggleRevealAllWords(){
revealAllMenuWords = !revealAllMenuWords;
document.querySelectorAll("#wordList li.hidden-word").forEach(renderMenuWord);
updateRevealAllButton();
}

function findMenuItemByWord(word){
return Array.from(document.querySelectorAll("#wordList li")).find(li => li.dataset.hidden === word) || null;
}

function findAreaByWord(word){
return Array.from(document.querySelectorAll("map[name='image-map'] area")).find(area => {
let handler = area.getAttribute("onclick") || "";
return handler.includes("'" + word + "'");
}) || null;
}

function getAreaBounds(area){

let coords = (area.coords || "").split(",").map(Number).filter(Number.isFinite);
if(coords.length < 2) return null;

let xs = [];
let ys = [];

for(let i=0;i<coords.length;i+=2){
xs.push(coords[i]);
ys.push(coords[i + 1]);
}

if(!xs.length || !ys.length) return null;

return {
  minX: Math.min(...xs),
  maxX: Math.max(...xs),
  minY: Math.min(...ys),
  maxY: Math.max(...ys)
};
}

function getRegionForArea(area){

let bounds = getAreaBounds(area);
if(!bounds) return null;

let sourceCenterY = (bounds.minY + bounds.maxY) / 2;
let displayCenterY = (sourceCenterY / sourceMapSize) * displayMapSize;

return regionDefinitions.find(region =>
displayCenterY >= region.top &&
displayCenterY <= (region.top + region.height)
) || regionDefinitions[regionDefinitions.length - 1] || null;
}

let activeRegionHintTimeout = null;

function centerViewportOnHint(bounds){

let container = document.querySelector(".container");
if(!container) return;

let rect = container.getBoundingClientRect();
let scaleX = rect.width / displayMapSize;
let scaleY = rect.height / displayMapSize;

let hintCenterX = (bounds.left + (bounds.width / 2)) * scaleX;
let hintCenterY = (bounds.top + (bounds.height / 2)) * scaleY;

let targetLeft = window.scrollX + rect.left + hintCenterX - (window.innerWidth / 2);
let targetTop = window.scrollY + rect.top + hintCenterY - (window.innerHeight / 2);

window.scrollTo({
left: Math.max(0, targetLeft),
top: Math.max(0, targetTop),
behavior: "smooth"
});
}

function flashRegionHint(regionId){

let regionEl = document.getElementById("regionHint-" + regionId);
if(!regionEl) return;

document.querySelectorAll(".hint-region.active").forEach(el => el.classList.remove("active"));

if(activeRegionHintTimeout){
  clearTimeout(activeRegionHintTimeout);
}

regionEl.classList.add("active");

activeRegionHintTimeout = setTimeout(() => {
  regionEl.classList.remove("active");
}, 2200);
}

function applyHint(item, hintLevel){

let nextLevel = Math.max(Number(item.dataset.hintLevel || 0), hintLevel);
item.dataset.hintLevel = String(Math.min(nextLevel, 2));

if(hintLevel === 2){
  let area = findAreaByWord(item.dataset.hidden);
  let region = area ? getRegionForArea(area) : null;

  if(region){
    centerViewportOnHint(region);
    flashRegionHint(region.id);
  }
}

renderMenuWord(item);
saveHints();
}

function placeCaretAtEnd(el){

let range = document.createRange();
let selection = window.getSelection();

range.selectNodeContents(el);
range.collapse(false);
selection.removeAllRanges();
selection.addRange(range);
}

function finishGuessEdit(item, keepCurrentText=true){

if(item.contentEditable !== "true") return;

let nextGuess = keepCurrentText
? trimGuess(item.textContent, getHiddenLength(item.dataset.hidden))
: (item.dataset.guess || "");

item.contentEditable = "false";
item.removeAttribute("data-editing");

if(nextGuess){
  item.dataset.guess = nextGuess;
}else{
  delete item.dataset.guess;
}

renderMenuWord(item);
saveGuesses();
}

document.querySelectorAll("#wordList li").forEach(item => {

item.addEventListener("mouseenter", e => {

let text = item.dataset.def;
if(!text) return;

tooltip.textContent = text;
tooltip.style.opacity = "1";

});

item.addEventListener("mousemove", e => {

tooltip.style.left = (e.clientX + 10) + "px";
tooltip.style.top = (e.clientY + 10) + "px";

});

item.addEventListener("mouseleave", () => {

tooltip.style.opacity = "0";

});

item.addEventListener("click", e => {

if(e.button !== 0) return;
if(!item.classList.contains("hidden-word")) return;
if(item.classList.contains("found")) return;
if(Number(item.dataset.hintLevel || 0) >= 1) return;

item.contentEditable = "true";
item.dataset.editing = "true";
item.textContent = item.dataset.guess || "";
placeCaretAtEnd(item);
});

item.addEventListener("input", () => {

if(item.contentEditable !== "true") return;

let trimmed = trimGuess(item.textContent, getHiddenLength(item.dataset.hidden));

if(item.textContent !== trimmed){
  item.textContent = trimmed;
  placeCaretAtEnd(item);
}
});

item.addEventListener("keydown", e => {

if(item.contentEditable !== "true") return;

if(e.key === "Enter"){
  e.preventDefault();
  finishGuessEdit(item);
}

if(e.key === "Escape"){
  e.preventDefault();
  finishGuessEdit(item, false);
}
});

item.addEventListener("blur", () => {
finishGuessEdit(item);
});

item.addEventListener("contextmenu", e => {

e.preventDefault();

if(!item.classList.contains("hidden-word")) return;
if(item.classList.contains("found")) return;

finishGuessEdit(item);

let currentHint = Number(item.dataset.hintLevel || 0);

if(currentHint >= 2){
  alert("Essa palavra já recebeu todas as dicas.");
  return;
}

let nextHint = currentHint + 1;
let wantsHint = confirm("Deseja a " + nextHint + "° dica?");

if(!wantsHint) return;

applyHint(item, nextHint);
});

});
  
/* ===== answer highlights ===== */

const answerClips={};

function playFoundSound(){
try{
  foundSound.currentTime = 0;
  void foundSound.play();
}catch{}
}

function toggleAnswer(area,word){

if(!area.coords) return;

if(!answerClips[word]){

let coords=area.coords.split(",");
let points=[];

for(let i=0;i<coords.length;i+=2){
points.push(coords[i]+"px "+coords[i+1]+"px");
}

let clip = document.createElement("div");
clip.className = "answerClip";
clip.style.clipPath = "polygon(" + points.join(",") + ")";
clip.style.backgroundImage = "url(" + currentOverlay + ")";

const answersOverlay = document.getElementById("answersOverlay");

answersOverlay.appendChild(clip);

answerClips[word]=clip;
}

let menuWord = findMenuItemByWord(word) || menuItems["menu-"+word];
if(!menuWord) return;
let isVisible = answerClips[word].classList.contains("visible");

if(!isVisible){

  answerClips[word].classList.add("visible");
  menuWord.classList.add("found");
  playFoundSound();

  if(menuWord.classList.contains("hidden-word")){
  finishGuessEdit(menuWord, false);
  menuWord.textContent = menuWord.dataset.hidden;
 }
}

else if(allowToggleOff){

  answerClips[word].classList.remove("visible");
  menuWord.classList.remove("found");

  if(menuWord.classList.contains("hidden-word")){
    renderMenuWord(menuWord);
  };
}

updateCounter();
saveProgress();
}

function updateCounter(){

let found = document.querySelectorAll("#wordList li.found").length;

document.getElementById("counter").textContent =
found + " / " + totalWords;

  /* PUZZLE COMPLETE MESSAGE */

if(found === totalWords && totalWords > 0){

setTimeout(function(){
alert("fim! 🎉🎉");
},200);

}

/* SAVE PROGRESS */

function loadProgress(){

let saved = localStorage.getItem("polvo3PuzzleProgress");
if(!saved) return;

let words = JSON.parse(saved);

words.forEach(word => {

let area = findAreaByWord(word) || document.getElementById("area-" + word);

if(area){

// ONLY toggle if its not already visible
if(!answerClips[word] || 
   !answerClips[word].classList.contains("visible")){

toggleAnswer(area, word);
}
}
});
}

/* ===== reset ===== */

function clearAll(){

/* remove highlights */
for(let word in answerClips){
answerClips[word].classList.remove("visible");

}

document.querySelectorAll(".hint-region.active").forEach(el => el.classList.remove("active"));

/* reset menu */
document.querySelectorAll("#wordList li").forEach(li => {

  li.classList.remove("found");
  li.classList.remove("hint-revealed");
  finishGuessEdit(li, false);
  delete li.dataset.guess;
  delete li.dataset.hintLevel;

  /* 👇 THIS IS THE FIX */
  if(li.classList.contains("hidden-word")){
    renderMenuWord(li);
  }

});

revealAllMenuWords = false;
updateRevealAllButton();

localStorage.removeItem("polvo3PuzzleProgress");
localStorage.removeItem(guessStorageKey);
localStorage.removeItem(hintStorageKey);
updateCounter();
}

function confirmReset(){

if(confirm("Reset?")){
clearAll();
localStorage.removeItem("polvo3PuzzleProgress");
}

  }

/* ===== menu drag ===== */

let menu=wordMenu;
let header=menuHeader;

let offsetX,offsetY,dragging=false;

header.onmousedown=e=>{
dragging=true;
offsetX=e.clientX-menu.offsetLeft;
offsetY=e.clientY-menu.offsetTop;
};

document.onmousemove=e=>{
if(!dragging) return;
menu.style.left=(e.clientX-offsetX)+"px";
menu.style.top=(e.clientY-offsetY)+"px";
};

document.onmouseup=()=>dragging=false;

/* ===== collapse menu ===== */

toggleMenu.onclick=()=>wordMenu.classList.toggle("collapsed");

/* ===== rotate mandala ===== */

let rotation=0;

rotateMandala.onclick=function(){

rotation=(rotation+90)%360;

document.querySelector(".container")
.style.transform="rotate("+rotation+"deg)";

this.textContent="Rotate ("+rotation+"°)";

};

/* ===== drag scroll ===== */

let isDragging=false,startX,startY,scrollLeft,scrollTop;

document.addEventListener("mousedown",e=>{

if(e.target.closest("#wordMenu")) return;
if(e.button !== 0) return;

e.preventDefault();

isDragging=true;
document.body.classList.add("dragging");

startX=e.clientX;
startY=e.clientY;

scrollLeft=window.scrollX;
scrollTop=window.scrollY;

});

document.addEventListener("mousemove",e=>{

if(!isDragging) return;

window.scrollTo(
scrollLeft-(e.clientX-startX),
scrollTop-(e.clientY-startY)
);

});

document.addEventListener("mouseup",()=>{
isDragging=false;
document.body.classList.remove("dragging");
});

document.addEventListener("mouseleave",()=>{
isDragging=false;
document.body.classList.remove("dragging");
});

window.addEventListener("blur",()=>{
isDragging=false;
document.body.classList.remove("dragging");
});

/* ===== savePuzzleProgress ===== */

function saveProgress(){

localStorage.setItem(
"polvo3PuzzleProgress",
JSON.stringify(Object.keys(answerClips)
.filter(w => answerClips[w].classList.contains("visible")))
);

}
